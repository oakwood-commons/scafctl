apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: lint-schema-unknown-nested-field
  version: 1.0.0
  description: |
    Tests that scafctl lint detects unknown nested fields inside spec
    as schema violations.

spec:
  resolvers:
    env:
      name: env
      description: "test resolver"
      resolve:
        with:
          - provider: parameter
            inputs:
              key: "env"

  workflow:
    actions:
      deploy:
        name: deploy
        description: Deploy action
        provider: exec
        inputs:
          command: "echo deploy"

  # Unknown field inside spec — should be caught by schema validation
  badNestedField: 123

  testing:
    config:
      skipBuiltins: true

    cases:
      nested-field-detected:
        description: Lint should catch an unknown nested field inside spec
        command: [lint]
        args: ["-o", "json"]
        tags: [schema, lint, negative]
        expectFailure: true
        assertions:
          - expression: __exitCode != 0
            message: "Solution with unknown nested field should fail lint"
          - expression: >
              __output.findings.exists(f, f.ruleName == "schema-violation")
            message: "A schema-violation finding should be present"
          - contains: badNestedField
            message: "Error output should mention the offending nested field name"
