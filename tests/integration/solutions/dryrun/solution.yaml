apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: test-dryrun
  version: 1.0.0
  description: |
    Functional tests for dry-run functionality.
    Verifies that --dry-run resolves values without
    executing actions and returns expected output.

spec:
  resolvers:
    greeting:
      description: A simple greeting
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "Hello from dry-run!"

    environment:
      description: Target environment
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "test"

    computedMessage:
      description: Computed from other resolvers
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.greeting + ' env=' + _.environment"

  workflow:
    actions:
      greet:
        provider: exec
        inputs:
          command: echo
          args:
            - "{{ .greeting }}"

  testing:
    config:
      skipBuiltins: [render-defaults]

    cases:
      dryrun-resolves-values:
        description: Verify dry-run generates WhatIf messages with real resolver data
        command: [run, solution]
        args: ["--dry-run", "-o", "json"]
        tags: [dryrun, smoke]
        assertions:
          - expression: __exitCode == 0
          - contains: "wouldDo"
          - contains: "exec"

      dryrun-shows-actions:
        description: Verify dry-run shows planned actions in WhatIf format
        command: [run, solution]
        args: ["--dry-run"]
        tags: [dryrun]
        assertions:
          - expression: __exitCode == 0
          - contains: "DRY RUN: What would happen"
          - contains: "What if:"
          - contains: "Phase 1:"

      dryrun-verbose-json:
        description: Verify --verbose includes materializedInputs in JSON output
        command: [run, solution]
        args: ["--dry-run", "--verbose", "-o", "json"]
        tags: [dryrun, verbose]
        assertions:
          - expression: __exitCode == 0
          - contains: "materializedInputs"
          - contains: "wouldDo"

      dryrun-json-structure:
        description: Verify JSON report has correct structure
        command: [run, solution]
        args: ["--dry-run", "-o", "json"]
        tags: [dryrun, json]
        assertions:
          - expression: __exitCode == 0
          - contains: "\"dryRun\": true"
          - contains: "\"hasWorkflow\": true"
          - contains: "\"actionPlan\""
          - contains: "\"totalActions\""
          - contains: "\"totalPhases\""

      dryrun-yaml-output:
        description: Verify YAML output contains expected fields
        command: [run, solution]
        args: ["--dry-run", "-o", "yaml"]
        tags: [dryrun, yaml]
        assertions:
          - expression: __exitCode == 0
          - contains: "dryRun: true"
          - contains: "wouldDo:"
          - contains: "hasWorkflow: true"

      dryrun-computed-resolver:
        description: Verify computed resolvers work in dry-run
        command: [run, resolver]
        args: ["-o", "json"]
        tags: [dryrun, resolver]
        assertions:
          - expression: __exitCode == 0
          - contains: "computedMessage"
          - contains: "Hello from dry-run! env=test"
