apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: plugin-deps-test
  version: 1.0.0
  description: Solution for testing plugin CLI commands and plugin protocol

spec:
  resolvers:
    greeting:
      description: Static greeting
      resolve:
        with:
          - provider: static
            inputs:
              value: Hello from plugin test

  testing:
    config:
      # render-defaults: solution has no workflow.actions section
      skipBuiltins: [render-defaults]

    cases:
      plugins-help:
        description: Verify plugins help works
        command: [plugins, --help]
        injectFile: false
        assertions:
          - expression: __exitCode == 0
          - contains: install
          - contains: list

      plugins-list-empty:
        description: Verify plugins list works with empty cache
        command: [plugins, list]
        injectFile: false
        assertions:
          - expression: __exitCode == 0

      plugins-install-help:
        description: Verify plugins install help works
        command: [plugins, install, --help]
        injectFile: false
        assertions:
          - expression: __exitCode == 0

      build-plugin-help:
        description: Verify build plugin help works
        command: [build, plugin, --help]
        injectFile: false
        assertions:
          - expression: __exitCode == 0
          - contains: multi-platform
          - contains: --name
          - contains: --kind
          - contains: --version
          - contains: --platform
          - contains: --force

      build-plugin-missing-flags:
        description: Build plugin without required flags should fail
        command: [build, plugin]
        injectFile: false
        expectFailure: true
        assertions:
          - expression: __exitCode != 0

      build-help-shows-plugin:
        description: Build parent shows plugin subcommand
        command: [build, --help]
        injectFile: false
        assertions:
          - expression: __exitCode == 0
          - contains: plugin

      render-greeting:
        description: Verify resolver renders
        command: [run, resolver]
        args: ["-o", "json"]
        assertions:
          - expression: __exitCode == 0
          - contains: greeting
