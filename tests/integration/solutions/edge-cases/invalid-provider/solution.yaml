apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: test-invalid-provider
  version: 1.0.0
  description: |
    Functional tests for invalid provider error handling.
    Verifies that unknown provider names produce clear errors.

spec:
  resolvers:
    badProvider:
      description: Resolver using a non-existent provider
      resolve:
        with:
          - provider: does-not-exist
            inputs:
              value: "anything"

  testing:
    config:
      # lint: solution uses non-existent provider (does-not-exist) that lint correctly rejects
      # resolve-defaults: resolver uses non-existent provider that fails resolution
      # render-defaults: solution has no workflow.actions section
      skipBuiltins: [lint, resolve-defaults, render-defaults]

    cases:
      unknown-provider:
        description: Verify unknown provider produces meaningful error
        command: [run, resolver]
        tags: [edge-case, negative]
        expectFailure: true
        assertions:
          - notContains: "panic"
            target: combined
            message: "Should not panic on unknown provider"
