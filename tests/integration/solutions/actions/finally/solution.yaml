apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: test-action-finally
  version: 1.0.0
  description: |
    Functional tests for the finally section.
    Verifies that finally actions always run, even when
    main actions fail.

spec:
  resolvers:
    dbName:
      description: Test database name
      resolve:
        with:
          - provider: static
            inputs:
              value: "test_db"

  workflow:
    actions:
      setupDb:
        description: Create test database
        provider: exec
        inputs:
          command:
            expr: "'echo Creating database ' + _.dbName"

      runTests:
        description: Run test suite
        provider: exec
        dependsOn: [setupDb]
        inputs:
          command: "echo Running tests"

    finally:
      cleanupDb:
        description: Always clean up database — reads main action result via __actions (cross-section ref)
        provider: exec
        # No dependsOn needed — cross-section ordering is guaranteed structurally.
        # __actions.setupDb in the when condition is recorded in crossSectionRefs on the
        # rendered graph (informational). The when condition is always true so the action runs.
        when:
          expr: "__actions.setupDb.status == 'succeeded' || __actions.setupDb.status != 'succeeded'"
        inputs:
          command:
            expr: "'echo Dropping database ' + _.dbName"

      notifyComplete:
        description: Always send completion notification
        provider: exec
        inputs:
          command: "echo Sending completion notification"

  testing:
    cases:
      _run-base:
        description: Base template for finally tests
        command: [run, solution]
        args: ["-o", "json"]
        tags: [action, finally]
        assertions:
          - expression: __exitCode == 0

      _render-base:
        description: Base template for render tests
        command: [render, solution]
        args: ["-o", "json"]
        tags: [action, finally, render]
        assertions:
          - expression: __exitCode == 0

      finally-always-runs:
        description: Verify finally actions run after main actions
        extends: [_run-base]
        tags: [smoke]
        assertions:
          - expression: __output.status == "succeeded"
          - expression: __output.actions["setupDb"].status == "succeeded"
          - expression: __output.actions["runTests"].status == "succeeded"
          - expression: __output.actions["cleanupDb"].status == "succeeded"
            message: "Finally cleanup should run"
          - expression: __output.actions["notifyComplete"].status == "succeeded"
            message: "Finally notification should run"

      render-has-finally:
        description: Verify render shows finally section
        extends: [_render-base]
        assertions:
          - expression: __output.metadata.hasFinally == true
            message: "Rendered graph should indicate hasFinally"
          - expression: size(__output.finallyOrder) > 0
            message: "finallyOrder should not be empty"

      finally-output-content:
        description: Verify finally action output content
        extends: [_run-base]
        assertions:
          - expression: __output.actions["cleanupDb"].results.stdout.contains("Dropping database test_db")
            message: "Cleanup should reference the database name"

      render-cross-section-refs:
        description: Verify finally action that reads __actions.<main> has crossSectionRefs in rendered graph
        extends: [_render-base]
        assertions:
          - expression: has(__output.actions["cleanupDb"].crossSectionRefs)
            message: "cleanupDb should have crossSectionRefs (reads __actions.setupDb in when)"
          - expression: __output.actions["cleanupDb"].crossSectionRefs.exists(r, r == "setupDb")
            message: "crossSectionRefs should contain setupDb"
          - expression: "!has(__output.actions[\"cleanupDb\"].dependsOn) || size(__output.actions[\"cleanupDb\"].dependsOn) == 0"
            message: "cleanupDb dependsOn must be empty — cross-section refs are not scheduling deps"
