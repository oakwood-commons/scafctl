apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: composed-test
  version: 1.0.0
  description: Solution with composed test files

compose:
  - tests/*.yaml

spec:
  resolvers:
    message:
      description: A simple message
      resolve:
        with:
          - provider: static
            inputs:
              value: composed-test-output

  testConfig:
    skipBuiltins: true

  tests:
    _base:
      description: Base template for rendering tests
      command: [run, resolver]
      args: ["-o", "json"]
      assertions:
        - expression: __exitCode == 0

    render-check:
      description: Verify rendering works via compose
      extends: [_base]
      assertions:
        - contains: message
