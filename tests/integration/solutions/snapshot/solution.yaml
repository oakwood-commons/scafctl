apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: test-snapshot
  version: 1.0.0
  description: |
    Functional tests for snapshot functionality.
    Verifies snapshot creation, show, and diff commands
    work correctly with resolver output.

spec:
  resolvers:
    region:
      description: Deployment region
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "us-east-1"

    port:
      description: Service port
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 8080

    hostname:
      description: Computed hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'svc-' + _.region + ':' + string(_.port)"

    sensitiveKey:
      description: A sensitive API key
      sensitive: true
      resolve:
        with:
          - provider: static
            inputs:
              value: "secret-api-key-12345"

  testing:
    config:
      skipBuiltins: [render-defaults]

    cases:
      snapshot-resolvers:
        description: Verify all resolvers resolve for snapshot
        command: [run, resolver]
        args: ["-o", "json"]
        tags: [snapshot, smoke]
        assertions:
          - expression: __exitCode == 0
          - contains: "region"
          - contains: "us-east-1"
          - contains: "hostname"
          - contains: "svc-us-east-1:8080"

      snapshot-redacted-table:
        description: Verify sensitive values are redacted in table output
        command: [run, resolver]
        tags: [snapshot, sensitive]
        assertions:
          - expression: __exitCode == 0
          - notContains: "secret-api-key-12345"
            message: "Sensitive value should be masked in table output"
          - contains: "us-east-1"
            message: "Non-sensitive value should be visible"

      snapshot-json-output:
        description: Verify JSON output includes all resolver values
        command: [run, resolver]
        args: ["-o", "json"]
        tags: [snapshot, json]
        assertions:
          - expression: __exitCode == 0
          - expression: __output.region == "us-east-1"
          - expression: __output.port == 8080
          - expression: __output.hostname == "svc-us-east-1:8080"
