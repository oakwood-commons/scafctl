apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: parent-resolver
  version: 1.0.0
spec:
  resolvers:
    child-data:
      type: any
      timeout: 90s
      resolve:
        with:
          - provider: solution
            inputs:
              source: "child.yaml"
              inputs:
                message: "passed from parent"
              timeout: "90s"
