# Run:   scafctl run resolver -f examples/solutions/nested-bundle/parent.yaml
# Build: scafctl build solution -f examples/solutions/nested-bundle/parent.yaml --dry-run

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: nested-bundle-example
  version: 1.0.0
  description: |
    Nested bundle support where a parent solution references a sub-solution
    with its own file dependencies. The bundler recursively discovers all
    files referenced by sub-solutions and includes them in the parent bundle.

spec:
  resolvers:
    # Parent reads a local config file — auto-discovered for bundling.
    config:
      type: any
      description: "Parent configuration"
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: "parent-config.txt"

    # Sub-solution reference — the bundler recursively analyzes child.yaml
    # and discovers its own file dependencies (templates/greeting.tmpl).
    child_data:
      type: any
      description: "Data from the child sub-solution"
      resolve:
        with:
          - provider: solution
            inputs:
              source: "./sub/child.yaml"
              inputs:
                name: "World"
