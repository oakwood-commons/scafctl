apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: terraform-scaffold
  version: 1.0.0
  description: Scaffold Terraform environments using resolvers, templates, and filesystem actions

spec:
  resolvers:
    app:
      description: Application name
      resolve:
        with:
          - provider: parameter
            inputs:
              key: app
          - provider: static
            inputs:
              value: my-app
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z0-9-]+$"
            message: "App name must be lowercase alphanumeric or hyphens"

    environments:
      description: Target deployment environments
      resolve:
        with:
          - provider: parameter
            inputs:
              key: environments
          - provider: static
            inputs:
              value: "dev,qa,prod"

      transform:
        with:
          - provider: cel
            inputs:
              expression: "__self.split(\",\").map(e, e.trim())"

      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self.size() > 0"
            message: "At least one environment must be specified"

    mainTfTemplate:
      description: main.tf template content
      resolve:
        with:
          - provider: filesystem
            inputs:
              path: templates/main.tf.tmpl

    tfvarsTemplate:
      description: auto.tfvars template content
      resolve:
        with:
          - provider: filesystem
            inputs:
              path: templates/auto.tfvars.tmpl

  actions:
    createEnvironment:
      description: Generate Terraform configuration files for each environment
      provider: filesystem

      forEach:
        item: env
        in: _.environments

      inputs:
        operations:
          - name: createDirectory
            action: mkdir
            path:
              tmpl: "./{{ .env }}"

          - name: writeMainTf
            action: write
            path:
              tmpl: "./{{ .env }}/main.tf"
            content:
              rslvr: mainTfTemplate

          - name: writeTFvars
            action: write
            path:
              tmpl: "./{{ .env }}/auto.tfvars"
            content:
              rslvr: tfvarsTemplate
