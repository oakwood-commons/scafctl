apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: terraform-scaffold
  version: 1.0.0
  description: Scaffold Terraform environments using resolvers, templates, and filesystem actions

spec:
  resolvers:
    app:
      description: Application name
      resolve:
        with:
          - provider: parameter
            inputs:
              key: app
          - provider: static
            inputs:
              value: my-app
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z0-9-]+$"
            message: "App name must be lowercase alphanumeric or hyphens"

    environments:
      description: Target deployment environments
      type: any
      resolve:
        with:
          - provider: parameter
            inputs:
              key: environments
          - provider: static
            inputs:
              value: "dev,qa,prod"

      transform:
        with:
          - provider: cel
            inputs:
              expression: "__self.split(\",\").map(e, e.trim())"

      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self.size() > 0"
            message: "At least one environment must be specified"

    mainTfTemplate:
      description: main.tf template content
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: templates/main.tf.tmpl
          - provider: static
            inputs:
              value: |
                # Auto-generated by scafctl
                terraform {
                  required_version = ">= 1.0"
                }

    tfvarsTemplate:
      description: auto.tfvars template content
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: templates/auto.tfvars.tmpl
          - provider: static
            inputs:
              value: |
                # Auto-generated by scafctl
                # Add environment-specific variables here

  workflow:
    actions:
      createDirectory:
        description: Create directory for each environment
        provider: directory

        forEach:
          item: env
          in:
            expr: "_.environments"

        inputs:
          operation: mkdir
          path:
            tmpl: "./{{ .env }}"

      writeMainTf:
        description: Write main.tf for each environment
        provider: file
        dependsOn: [createDirectory]

        forEach:
          item: env
          in:
            expr: "_.environments"

        inputs:
          operation: write
          path:
            tmpl: "./{{ .env }}/main.tf"
          content:
            rslvr: mainTfTemplate

      writeTFvars:
        description: Write auto.tfvars for each environment
        provider: file
        dependsOn: [createDirectory]

        forEach:
          item: env
          in:
            expr: "_.environments"

        inputs:
          operation: write
          path:
            tmpl: "./{{ .env }}/auto.tfvars"
          content:
            rslvr: tfvarsTemplate
