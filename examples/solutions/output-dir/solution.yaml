# Run: scafctl run solution -f examples/solutions/output-dir/solution.yaml --output-dir /tmp/output-dir-demo
#
# Verify: cat /tmp/output-dir-demo/greeting.txt

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: output-dir-demo
  version: 1.0.0
  description: |
    Demonstrates the --output-dir flag and phase-based directory model.
    Resolvers read from CWD, actions write to output-dir.

spec:
  # ===========================================================================
  # RESOLVERS: Always operate in CWD (gathering data)
  # ===========================================================================
  resolvers:
    # Read content from a file in the current working directory.
    # This demonstrates that resolvers always use CWD regardless of --output-dir.
    source-content:
      description: Read source file from CWD
      type: any
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: source.txt

    # Static data for template rendering
    project-config:
      description: Project configuration data
      type: any
      resolve:
        with:
          - provider: static
            inputs:
              value:
                name: my-project
                version: "2.1.0"
                environment: production
                replicas: 3

    # Generate a greeting using CEL expression
    greeting:
      description: Dynamic greeting message
      resolve:
        with:
          - provider: cel
            inputs:
              expression: >-
                "Hello from " + _["project-config"].name + " v" + _["project-config"].version +
                " (" + _["project-config"].environment + ")"
      dependsOn:
        - project-config

  # ===========================================================================
  # WORKFLOW: Actions operate in --output-dir (producing output)
  # ===========================================================================
  workflow:
    actions:
      # Write the greeting to a file in the output directory.
      write-greeting:
        description: Write greeting to output directory
        provider: file
        inputs:
          operation: write
          path: greeting.txt
          content:
            rslvr: greeting

      # Write a structured config file into a subdirectory of the output directory.
      # The config/ subdirectory is auto-created by the file provider.
      write-config:
        description: Write project config to output directory
        provider: file
        inputs:
          operation: write
          path: config/app.yaml
          createDirs: true
          content:
            expr: >-
              "# Auto-generated project configuration\n" +
              "name: " + _["project-config"].name + "\n" +
              "version: " + _["project-config"].version + "\n" +
              "environment: " + _["project-config"].environment + "\n" +
              "replicas: " + string(_["project-config"].replicas)

      # Demonstrate the __cwd escape hatch.
      # When you need to reference the original working directory from an action,
      # use the __cwd built-in variable.
      write-cwd-ref:
        description: Write a file that references __cwd
        provider: file
        inputs:
          operation: write
          path: cwd-reference.txt
          content:
            expr: >-
              "# This file was generated by an action in the output directory.\n" +
              "# The original working directory was:\n" +
              "cwd=" + __cwd + "\n" +
              "\n" +
              "# Source file was read from:\n" +
              "source=" + __cwd + "/source.txt"

  # ===========================================================================
  # TESTING: Inline functional tests
  # ===========================================================================
  testing:
    config:
      skipBuiltins: [render-defaults, resolve-defaults]

    cases:
      resolver-basic:
        description: Verify resolvers produce expected data
        command: [run, resolver]
        args: ["-o", "json"]
        assertions:
          - expression: __exitCode == 0
          - contains: "Hello from my-project"
          - contains: "source.txt"

      lint-clean:
        description: Verify solution passes lint
        command: [lint]
        assertions:
          - expression: __exitCode == 0
