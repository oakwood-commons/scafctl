apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: email-notifier
  version: 1.0.0
  description: Send notification emails using provider-backed actions. Designed for local execution and pipeline rendering.

spec:
  resolvers:
    isDryRun:
      description: A dry run
      resolve:
        with:
          - provider: parameter
            inputs:
              key: dry-run
          - provider: static
            inputs:
              value: false

    environment:
      description: Deployment environment
      resolve:
        with:
          - provider: parameter
            inputs:
              key: environment
          - provider: static
            inputs:
              value: dev
      transform:
        with:
          - provider: cel
            inputs:
              expression: "__self.lowerAscii()"
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"dev\", \"stage\", \"prod\"]"
            message: "Invalid environment: must be dev, stage, or prod"

    emailFrom:
      description: Sender email address
      resolve:
        with:
          - provider: parameter
            inputs:
              key: emailFrom
          - provider: static
            inputs:
              value: noreply@example.com
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[^@]+@[^@]+\\.[^@]+$"
            message: "EMAIL_FROM must be a valid email address"

    emailTo:
      description: Recipient email address
      resolve:
        with:
          - provider: parameter
            inputs:
              key: emailTo
          - provider: static
            inputs:
              value: team@example.com
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[^@]+@[^@]+\\.[^@]+$"
            message: "EMAIL_TO must be a valid email address"

    subject:
      description: Email subject line
      resolve:
        with:
          - provider: parameter
            inputs:
              key: subject
          - provider: static
            inputs:
              value: "Notification"

    body:
      description: Email body content
      resolve:
        with:
          - provider: parameter
            inputs:
              key: body
          - provider: static
            inputs:
              value: "Hello from scafctl"

  workflow:
    actions:
      sendEmail:
        description: Send an email notification (simulated with echo)
        provider: exec
        when:
          expr: "_.environment != \"dev\""
        inputs:
          command:
            expr: "'echo Sending email from ' + _.emailFrom + ' to ' + _.emailTo + ' subject: ' + _.subject"

      renderPreview:
        description: Render email payload without sending
        provider: static
        when:
          expr: "_.isDryRun == true"
        inputs:
          value:
            from:
              rslvr: emailFrom
            to:
              rslvr: emailTo
            subject:
              rslvr: subject
            body:
              rslvr: body
