apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: taskfile-build
  version: 1.0.0
  description: Build and release workflow using taskfile patterns

spec:
  resolvers:
    repo:
      description: Repository name
      resolve:
        with:
          - provider: static
            inputs:
              value: scafctl

    version:
      description: Version to build and release
      resolve:
        with:
          - provider: parameter
            inputs:
              key: version
          - provider: static
            inputs:
              value: dev
      validate:
        with:
          - provider: validation
            inputs:
              match: '^(dev|\d+\.\d+\.\d+.*)$'
            message: "Invalid version format"

    goos:
      description: Target operating system
      resolve:
        with:
          - provider: parameter
            inputs:
              key: goos
          - provider: static
            inputs:
              value: linux
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"linux\", \"darwin\", \"windows\"]"
            message: "Invalid OS: must be linux, darwin, or windows"

    goarch:
      description: Target architecture
      resolve:
        with:
          - provider: parameter
            inputs:
              key: goarch
          - provider: static
            inputs:
              value: amd64
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"amd64\", \"arm64\"]"
            message: "Invalid architecture: must be amd64 or arm64"

    buildDir:
      description: Build output directory
      resolve:
        with:
          - provider: static
            inputs:
              value: dist

  actions:
    clean:
      description: Clean build directory
      provider: exec
      inputs:
        cmd:
          - rm
          - -rf
        args:
          directory:
            rslvr: buildDir

    test:
      description: Run tests
      provider: exec
      dependsOn: [clean]
      inputs:
        cmd:
          - go
          - test
          - ./...

    build:
      description: Build binary
      provider: exec
      dependsOn: [test]
      inputs:
        env:
          GOOS:
            rslvr: goos
          GOARCH:
            rslvr: goarch
        cmd:
          - go
          - build
          - -o
        args:
          output:
            tmpl: "{{ .buildDir }}/{{ .repo }}"
          source: ./cmd/scafctl
        context:
          buildDir:
            rslvr: buildDir
          repo:
            rslvr: repo

    release:
      description: Create GitHub release
      provider: api
      dependsOn: [build]
      when:
        expr: "_.version != \"dev\""
      inputs:
        endpoint: https://api.github.com/repos/oakwood-commons/scafctl/releases
        method: POST
        headers:
          Authorization:
            tmpl: "Bearer {{ .github_token }}"
        body:
          tag_name:
            rslvr: version
          name:
            tmpl: "Release {{ .version }}"
          draft: false
          prerelease:
            expr: "_.version.contains(\"alpha\") || _.version.contains(\"beta\")"
        context:
          version:
            rslvr: version
