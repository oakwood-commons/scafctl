apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: taskfile-build
  version: 1.0.0
  description: Build and release workflow using taskfile patterns

spec:
  resolvers:
    repo:
      description: Repository name
      resolve:
        with:
          - provider: static
            inputs:
              value: scafctl

    version:
      description: Version to build and release
      resolve:
        with:
          - provider: parameter
            inputs:
              key: version
          - provider: static
            inputs:
              value: dev
      validate:
        with:
          - provider: validation
            inputs:
              match: '^(dev|\d+\.\d+\.\d+.*)$'
            message: "Invalid version format"

    goos:
      description: Target operating system
      resolve:
        with:
          - provider: parameter
            inputs:
              key: goos
          - provider: static
            inputs:
              value: linux
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"linux\", \"darwin\", \"windows\"]"
            message: "Invalid OS: must be linux, darwin, or windows"

    goarch:
      description: Target architecture
      resolve:
        with:
          - provider: parameter
            inputs:
              key: goarch
          - provider: static
            inputs:
              value: amd64
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"amd64\", \"arm64\"]"
            message: "Invalid architecture: must be amd64 or arm64"

    buildDir:
      description: Build output directory
      resolve:
        with:
          - provider: static
            inputs:
              value: dist

  workflow:
    actions:
      clean:
        description: Clean build directory
        provider: exec
        inputs:
          command:
            expr: "'rm -rf ' + _.buildDir"

      test:
        description: Run tests
        provider: exec
        dependsOn: [clean]
        inputs:
          command: "go test ./..."

      build:
        description: Build binary
        provider: exec
        dependsOn: [test]
        inputs:
          env:
            GOOS:
              rslvr: goos
            GOARCH:
              rslvr: goarch
          command:
            expr: "'go build -o ' + _.buildDir + '/' + _.repo + ' ./cmd/scafctl'"

      release:
        description: Create GitHub release
        provider: http
        dependsOn: [build]
        when:
          expr: "_.version != \"dev\""
        inputs:
          url: https://api.github.com/repos/oakwood-commons/scafctl/releases
          method: POST
          headers:
            Content-Type: application/json
          body:
            expr: |
              toJson({
                "tag_name": _.version,
                "name": "Release " + _.version,
                "draft": false,
                "prerelease": _.version.contains("alpha") || _.version.contains("beta")
              })
