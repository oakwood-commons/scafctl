apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: comprehensive-example
  description: |
    Comprehensive solution demonstrating all scafctl features:
    - All four input forms (literal, rslv, expr, tmpl)
    - Multiple provider types in resolvers
    - Transform and validation patterns
    - Actions with dependencies and conditions
    - forEach iteration
    - Result consumption between actions
  version: 1.0.0
  maintainers:
    - name: Platform Team
      email: platform@example.com

spec:
  # ============================================================================
  # RESOLVERS: Data gathering, transformation, and validation
  # ============================================================================
  resolvers:
    # -------------------------------------------------------------------------
    # Example 1: Parameter with static fallback
    # Uses: parameter provider, static provider
    # -------------------------------------------------------------------------
    environment:
      description: Target deployment environment
      resolve:
        with:
          # Try parameter first (from CLI: -r environment=prod)
          - provider: parameter
            inputs:
              key: environment
          # Final fallback to literal default
          - provider: static
            inputs:
              value: dev
      # Transform: normalize to lowercase
      transform:
        with:
          - provider: cel
            inputs:
              expression: "__self.lowerAscii()"
      # Validate: must be one of approved environments
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self in [\"dev\", \"staging\", \"prod\"]"
            message: "Environment must be dev, staging, or prod"

    # -------------------------------------------------------------------------
    # Example 2: Reading from filesystem
    # Uses: filesystem provider, cel provider for transform
    # -------------------------------------------------------------------------
    appName:
      description: Application name from file or parameter
      resolve:
        with:
          - provider: parameter
            inputs:
              key: app
          - provider: file
            inputs:
              operation: read
              path: ./app-name.txt
          - provider: static
            inputs:
              value: my-app
      transform:
        with:
          # Trim whitespace
          - provider: cel
            inputs:
              expression: "__self.trim()"
          # Convert to lowercase
          - provider: cel
            inputs:
              expression: "__self.lowerAscii()"
          # Replace underscores with hyphens
          - provider: cel
            inputs:
              expression: "__self.replace(\"_\", \"-\")"
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z0-9-]+$"
              notMatch: "^-|-$"
            message: "App name must be lowercase alphanumeric with hyphens, not starting or ending with hyphen"

    # -------------------------------------------------------------------------
    # Example 3: Git info via exec provider
    # Uses: exec provider with CEL transform to extract stdout
    # -------------------------------------------------------------------------
    gitBranch:
      description: Current git branch
      resolve:
        with:
          - provider: exec
            inputs:
              command: git
              args:
                - rev-parse
                - --abbrev-ref
                - HEAD
          - provider: static
            inputs:
              value: main
      transform:
        with:
          - provider: cel
            inputs:
              expression: "has(__self.stdout) ? __self.stdout.trim() : string(__self)"

    gitCommit:
      description: Current git commit SHA (short)
      resolve:
        with:
          - provider: exec
            inputs:
              command: git
              args:
                - rev-parse
                - --short
                - HEAD
          - provider: static
            inputs:
              value: "0000000"
      transform:
        with:
          - provider: cel
            inputs:
              expression: "has(__self.stdout) ? __self.stdout.trim() : string(__self)"

    # -------------------------------------------------------------------------
    # Example 4: CEL expression to derive value from other resolvers
    # Uses: cel provider with expressions referencing other resolvers
    # -------------------------------------------------------------------------
    version:
      description: Computed version from git or parameter
      resolve:
        with:
          - provider: parameter
            inputs:
              key: version
          - provider: cel
            inputs:
              # Expression using other resolver values
              expression: "_.gitBranch == \"main\" ? \"1.0.0-\" + _.gitCommit : \"0.0.0-\" + _.gitCommit"

    # -------------------------------------------------------------------------
    # Example 5: API call to fetch data
    # Uses: api provider
    # -------------------------------------------------------------------------
    configFromAPI:
      description: Configuration fetched from remote API
      resolve:
        with:
          - provider: http
            inputs:
              url: https://api.example.com/config
              method: GET
          # Fallback when API is unavailable
          - provider: static
            inputs:
              value:
                data:
                  - endpoint: "https://api.example.com"
                    timeout: 30
      validate:
        with:
          - provider: validation
            inputs:
              expression: "has(__self.data) && __self.data.size() > 0"
            message: "API response must contain data"

    # -------------------------------------------------------------------------
    # Example 6: Complex list processing
    # Uses: parameter with CSV, cel for transformation
    # -------------------------------------------------------------------------
    regions:
      description: Deployment regions as list
      resolve:
        with:
          - provider: parameter
            inputs:
              key: regions
          - provider: static
            inputs:
              value: "us-east-1,us-west-2"
      transform:
        with:
          # Split CSV into array
          - provider: cel
            inputs:
              expression: "__self.split(\",\").map(r, r.trim())"
          # Filter out empty strings
          - provider: cel
            inputs:
              expression: "__self.filter(r, r.size() > 0)"
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self.size() > 0 && __self.size() <= 5"
            message: "Must specify 1-5 regions"

    # -------------------------------------------------------------------------
    # Example 7: Template content for later use
    # Uses: filesystem provider to load template files
    # -------------------------------------------------------------------------
    deploymentTemplate:
      description: Kubernetes deployment template
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: ./templates/deployment.yaml.tmpl
          - provider: static
            inputs:
              value: "# Auto-generated deployment manifest"

    serviceTemplate:
      description: Kubernetes service template
      resolve:
        with:
          - provider: file
            inputs:
              operation: read
              path: ./templates/service.yaml.tmpl
          - provider: static
            inputs:
              value: "# Auto-generated service manifest"

    # -------------------------------------------------------------------------
    # Example 8: Boolean flags
    # -------------------------------------------------------------------------
    dryRun:
      description: Whether to run in dry-run mode
      resolve:
        with:
          - provider: parameter
            inputs:
              key: dryRun
          - provider: static
            inputs:
              value: false
      validate:
        with:
          - provider: validation
            inputs:
              expression: "type(__self) == bool"
            message: "dryRun must be a boolean"

    # -------------------------------------------------------------------------
    # Example 9: Numeric values with constraints
    # -------------------------------------------------------------------------
    replicas:
      description: Number of replicas to deploy
      resolve:
        with:
          - provider: parameter
            inputs:
              key: replicas
          - provider: static
            inputs:
              value: 3
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self >= 1 && __self <= 10"
            message: "Replicas must be between 1 and 10"

    # -------------------------------------------------------------------------
    # Example 10: Computed value using multiple resolvers
    # Demonstrates expr input form in action inputs
    # -------------------------------------------------------------------------
    imageTag:
      description: Docker image tag combining app name and version
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.appName + \":\" + _.version"

  # ============================================================================
  # ACTIONS: Side effects and orchestration
  # ============================================================================
  actions:
    # -------------------------------------------------------------------------
    # Action 1: Simple action with literal inputs
    # Demonstrates: literal input values
    # -------------------------------------------------------------------------
    createOutputDirectory:
      description: Create output directory for artifacts
      provider: exec
      inputs:
        # Literal string input
        command: "mkdir -p ./output"

    # -------------------------------------------------------------------------
    # Action 2: Action using resolver binding (rslv)
    # Demonstrates: rslvr input form
    # -------------------------------------------------------------------------
    validateEnvironment:
      description: Log the target environment
      provider: exec
      dependsOn: [createOutputDirectory]
      inputs:
        command: "echo 'Deploying to environment:'"
        # Direct resolver binding - passes the value as-is
        env:
          ENVIRONMENT:
            rslvr: environment
          APP_NAME:
            rslvr: appName
          VERSION:
            rslvr: version

    # -------------------------------------------------------------------------
    # Action 3: Action with expression inputs (expr)
    # Demonstrates: expr input form
    # -------------------------------------------------------------------------
    buildDockerImage:
      description: Build Docker image with computed tag
      provider: exec
      dependsOn: [validateEnvironment]
      when:
        # Conditional execution using expr
        expr: "!_.dryRun && _.environment != \"dev\""
      inputs:
        command: "docker build -t"
          # Expression input combining multiple values
        env:
          IMAGE_TAG:
            expr: "\"myregistry.io/\" + _.appName + \":\" + _.version"
          BUILD_TIME:
            expr: "string(now())"
          GIT_COMMIT:
            rslvr: gitCommit

    # -------------------------------------------------------------------------
    # Action 4: Action with template inputs (tmpl)
    # Demonstrates: tmpl input form
    # -------------------------------------------------------------------------
    generateManifests:
      description: Generate Kubernetes manifests for each region
      provider: file
      dependsOn: [validateEnvironment]

      # Iterate over regions
      forEach:
        item: __region # using __item to avoid name clash
        in: _.regions

      inputs:
        operations:
          # Create region directory
          - name: createRegionDir
            action: mkdir
            path:
              # Template string using __item (forEach variable)
              tmpl: "./output/{{ .__region }}"

          # Write deployment manifest
          - name: writeDeployment
            action: write
            path:
              tmpl: "./output/{{ .__region }}/deployment.yaml"
            content:
              # Resolver binding to template content
              rslvr: deploymentTemplate
            # Template context for rendering
            context:
              appName:
                rslvr: appName
              version:
                rslvr: version
              replicas:
                rslvr: replicas
              environment:
                rslvr: environment
              region:
                expr: "_.__region"

          # Write service manifest
          - name: writeService
            action: write
            path:
              tmpl: "./output/{{ .__region }}/service.yaml"
            content:
              rslvr: serviceTemplate
            context:
              appName:
                rslvr: appName
              environment:
                rslvr: environment
              region:
                expr: "_.__region"

    # -------------------------------------------------------------------------
    # Action 5: API call action with mixed input forms
    # Demonstrates: multiple input forms in same action
    # -------------------------------------------------------------------------
    notifyDeployment:
      description: Send deployment notification to webhook
      provider: http
      dependsOn: [generateManifests]
      when:
        expr: "!_.dryRun"
      inputs:
        url: https://hooks.example.com/deployments
        method: POST
        headers:
          # Literal value
          Content-Type: application/json
          # Template value
        # Expression creating JSON body
        body:
          app:
            rslvr: appName
          version:
            rslvr: version
          environment:
            rslvr: environment
          regions:
            rslvr: regions
          timestamp:
            expr: "string(now())"
          commit:
            rslvr: gitCommit
          branch:
            rslvr: gitBranch
          message:
            tmpl: "Deployed {{ .appName }} version {{ .version }} to {{ .environment }}"

    # -------------------------------------------------------------------------
    # Action 6: Action with results for downstream consumption
    # Demonstrates: action results and fromAction references
    # -------------------------------------------------------------------------
    deployToCluster:
      description: Deploy manifests to Kubernetes cluster
      provider: exec
      dependsOn: [generateManifests, buildDockerImage]
      when:
        expr: "!_.dryRun"

      forEach:
        item: __region
        in: _.regions

      inputs:
        command:
          tmpl: "kubectl apply -f ./output/{{ .__region }}/"
        args:
          - "-n"
          - rslvr: environment
          - "--context"
          - tmpl: "cluster-{{ .__region }}"

    # -------------------------------------------------------------------------
    # Action 7: Retry pattern with until condition
    # Demonstrates: until for retry logic
    # -------------------------------------------------------------------------
    waitForDeployment:
      description: Wait for deployment to be ready
      provider: exec
      dependsOn: [deployToCluster]
      when:
        expr: "!_.dryRun"
      # Retry until deployment is ready (max attempts/timeout in provider config)
      until:
        expr: '_.__actions.deployToCluster.results.exitCode == 0 && _.__actions.deployToCluster.results.stdout.contains(\"Running\")'
      inputs:
        command:
          tmpl: "kubectl get pods -n {{ .environment }} -l app={{ .appName }}"
        context:
          environment:
            rslvr: environment
          appName:
            rslvr: appName

    # -------------------------------------------------------------------------
    # Action 8: Consuming results from previous action
    # Demonstrates: using action results via __actions reference
    # -------------------------------------------------------------------------
    verifyDeployment:
      description: Verify deployment succeeded
      provider: exec
      dependsOn: [waitForDeployment]
      when:
        expr: "!_.dryRun"
      inputs:
        command: "echo 'Verifying deployment status'"
        # Access results from deployToCluster action
        validate:
          statusCheck:
            expr: "__actions.deployToCluster.results.value.deploymentStatus == 0"

    # -------------------------------------------------------------------------
    # Action 9: Conditional action based on environment
    # Demonstrates: complex when conditions
    # -------------------------------------------------------------------------
    runSmokeTests:
      description: Run smoke tests in non-production environments
      provider: exec
      dependsOn: [verifyDeployment]
      when:
        expr: "_.environment == \"staging\" || _.environment == \"dev\""
      inputs:
        command: "npm run smoke-test"
        env:
          TEST_ENV:
            rslvr: environment
          TEST_URL:
            tmpl: "https://{{ .appName }}.{{ .environment }}.example.com"

    # -------------------------------------------------------------------------
    # Action 10: Summary report combining all inputs
    # Demonstrates: all four input forms in a single action
    # -------------------------------------------------------------------------
    generateReport:
      description: Generate deployment report
      provider: file
      dependsOn: [notifyDeployment, verifyDeployment]
      inputs:
        operations:
          - name: writeReport
            action: write
            path: ./output/deployment-report.json
            # Expression creating complex JSON structure
            content:
              expr: |
                {
                  "deployment": {
                    "app": _.appName,
                    "version": _.version,
                    "environment": _.environment,
                    "regions": _.regions,
                    "replicas": _.replicas,
                    "dryRun": _.dryRun
                  },
                  "git": {
                    "branch": _.gitBranch,
                    "commit": _.gitCommit
                  },
                  "timestamp": string(now()),
                  "status": "completed"
                }

          - name: writeMarkdown
            action: write
            path: ./output/deployment-report.md
            # Template for human-readable report
            content:
              tmpl: |
                # Deployment Report

                **Application**: {{ .appName }}
                **Version**: {{ .version }}
                **Environment**: {{ .environment }}
                **Regions**: {{ .regions | join ", " }}
                **Replicas**: {{ .replicas }}
                **Dry Run**: {{ .dryRun }}

                ## Git Information
                - Branch: {{ .gitBranch }}
                - Commit: {{ .gitCommit }}

                ## Status
                Deployment completed successfully at {{ .timestamp }}
            context:
              appName:
                rslvr: appName
              version:
                rslvr: version
              environment:
                rslvr: environment
              regions:
                rslvr: regions
              replicas:
                rslvr: replicas
              dryRun:
                rslvr: dryRun
              gitBranch:
                rslvr: gitBranch
              gitCommit:
                rslvr: gitCommit
              timestamp:
                expr: "string(now())"

    # -------------------------------------------------------------------------
    # Action 11: Cleanup action that always runs
    # Demonstrates: no dependencies, cleanup pattern
    # -------------------------------------------------------------------------
    cleanup:
      description: Clean up temporary files
      provider: exec
      # No dependsOn - can run independently
      inputs:
        command: "rm -rf ./temp"
        # Literal boolean flag
        continueOnError: true
