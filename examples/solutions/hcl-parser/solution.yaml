apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: hcl-parser-demo
  displayName: HCL Parser Demo
  category: solutions
  tags:
    - hcl
    - solution
  description: |
    Demonstrates the HCL provider to parse Terraform configuration
    and extract structured information about variables, resources,
    modules, and other block types.

spec:
  resolvers:
    tfConfig:
      description: Parse inline Terraform configuration
      resolve:
        with:
          - provider: hcl
            inputs:
              content: |
                terraform {
                  required_version = ">= 1.5.0"
                  required_providers {
                    aws = {
                      source  = "hashicorp/aws"
                      version = "~> 5.0"
                    }
                  }
                }

                variable "region" {
                  type        = string
                  default     = "us-east-1"
                  description = "AWS region"
                }

                variable "environment" {
                  type    = string
                  default = "dev"
                }

                resource "aws_instance" "web" {
                  ami           = "ami-12345678"
                  instance_type = "t3.micro"
                  tags = {
                    Name = "web-server"
                  }
                }

                module "vpc" {
                  source  = "terraform-aws-modules/vpc/aws"
                  version = "5.0.0"
                  name    = "main-vpc"
                }

                output "instance_id" {
                  value       = "i-mock"
                  description = "The instance ID"
                }

    variableNames:
      description: Extract just the variable names from the parsed config
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                _.tfConfig.variables.map(v, v.name)

    resourceSummary:
      description: Build a summary of resources with type and name
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                _.tfConfig.resources.map(r, r.type + "." + r.name)

    requiredVersion:
      description: Extract the required Terraform version
      resolve:
        with:
          - provider: cel
            inputs:
              expression: _.tfConfig.terraform.required_version
