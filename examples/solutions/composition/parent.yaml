# Run: scafctl run resolver -f examples/solutions/composition/parent.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: composition-example
  displayName: Composition Example
  category: solutions
  tags:
    - solution
  description: |
    Solution composition via the solution provider. The parent loads a child
    solution, passes parameters, and consumes the child's resolver values
    as a structured envelope: { resolvers: {...}, status: "success", errors: [] }
spec:
  resolvers:
    # Use the solution provider to load and execute a child solution.
    # The child's resolver values are returned as a structured envelope.
    child_data:
      type: any
      description: "Data from the child solution"
      resolve:
        with:
          - provider: solution
            inputs:
              source: "./child.yaml"
              inputs:
                message: "hello from parent"
              # Optional: only run specific resolvers from the child.
              # When omitted, all resolvers in the child are executed.
              # resolvers:
              #   - greeting
              # Optional: set a timeout for child execution.
              # timeout: "30s"

    # Extract individual values from the child's envelope using CEL.
    child_greeting:
      type: string
      description: "The greeting from the child solution"
      dependsOn:
        - child_data
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.child_data.resolvers.greeting"

    child_echo:
      type: string
      description: "The echoed parameter from the child solution"
      dependsOn:
        - child_data
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.child_data.resolvers['echo-param']"
