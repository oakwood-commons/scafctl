# Solution Composition Example
#
# This parent solution demonstrates the `solution` provider, which enables
# composing multiple solutions together. The parent loads a child solution,
# passes parameters to it, and consumes the child's resolver values.
#
# Usage:
#   scafctl run solution -f examples/solutions/composition/parent.yaml
#
# The child solution (child.yaml) resolves:
#   - greeting: a static string "hello from child"
#   - echo-param: echoes back the 'message' parameter
#
# The parent receives these as a structured envelope containing:
#   { resolvers: { greeting: "...", echo-param: "..." }, status: "success", errors: [] }

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: composition-example
  version: 1.0.0
spec:
  resolvers:
    # Use the solution provider to load and execute a child solution.
    # The child's resolver values are returned as a structured envelope.
    child-data:
      type: any
      description: "Data from the child solution"
      resolve:
        with:
          - provider: solution
            inputs:
              source: "./child.yaml"
              inputs:
                message: "hello from parent"
              # Optional: only run specific resolvers from the child.
              # When omitted, all resolvers in the child are executed.
              # resolvers:
              #   - greeting
              # Optional: set a timeout for child execution.
              # timeout: "30s"

    # Extract individual values from the child's envelope using CEL.
    child-greeting:
      type: string
      description: "The greeting from the child solution"
      dependsOn:
        - child-data
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.child_data.resolvers.greeting"

    child-echo:
      type: string
      description: "The echoed parameter from the child solution"
      dependsOn:
        - child-data
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.child_data.resolvers.echo_param"
