apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: child-solution
  displayName: Child Solution
  category: solutions
  tags:
    - solution
  description: Child solution consumed by composition/parent.yaml via the solution provider
spec:
  resolvers:
    greeting:
      type: string
      description: "A greeting message from the child solution"
      resolve:
        with:
          - provider: static
            inputs:
              value: "hello from child"
    echo-param:
      type: string
      description: "Echoes back the 'message' parameter passed from the parent"
      resolve:
        with:
          - provider: parameter
            inputs:
              key: message
