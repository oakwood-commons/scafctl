# Example solution for the MCP Server Tutorial.
# Copy to your project: mkdir -p mcp-demo && cp examples/mcp/tutorial-solution.yaml mcp-demo/solution.yaml
apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: greeting-service
  version: 1.0.0
  description: A simple greeting service that demonstrates resolvers, validation, and actions.
  maintainers:
    - name: Tutorial User
      email: tutorial@example.com
  tags:
    - tutorial
    - demo

spec:
  resolvers:
    username:
      description: Name of the person to greet
      type: string
      resolve:
        with:
          - provider: parameter
            inputs:
              key: username
          - provider: static
            inputs:
              value: World
      validate:
        with:
          - provider: validation
            inputs:
              match: '^[A-Za-z ]{1,50}$'
            message: "Username must be 1-50 alphabetic characters"

    style:
      description: Greeting style
      type: string
      resolve:
        with:
          - provider: parameter
            inputs:
              key: style
          - provider: static
            inputs:
              value: friendly
      transform:
        with:
          - provider: cel
            inputs:
              expression: '__self.lowerAscii()'
      validate:
        with:
          - provider: validation
            inputs:
              expression: '__self in ["friendly", "formal", "casual"]'
            message: "Style must be friendly, formal, or casual"

    message:
      description: Composed greeting message
      type: string
      dependsOn:
        - username
        - style
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                _.style == "formal" ? "Good day, " + _.username + "."
                : _.style == "casual" ? "Hey " + _.username + "!"
                : "Hello, " + _.username + "! Welcome!"

  actions:
    greet:
      description: Print the greeting to the console
      provider: exec
      inputs:
        command:
          expr: '"echo " + _.message'

    log:
      description: Log the greeting event
      provider: static
      dependsOn:
        - greet
      inputs:
        value:
          event: greeting_sent
          user:
            rslvr: username
          style:
            rslvr: style
