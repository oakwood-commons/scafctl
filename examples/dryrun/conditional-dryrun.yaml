# Run: scafctl run solution -f examples/dryrun/conditional-dryrun.yaml --dry-run
# Run: scafctl run solution -f examples/dryrun/conditional-dryrun.yaml --dry-run -o json
# Run: scafctl run solution -f examples/dryrun/conditional-dryrun.yaml --dry-run --verbose

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: conditional-dryrun-demo
  version: 1.0.0
  description: |
    Dry-run WhatIf with conditional (when) actions, multi-phase execution,
    and finally actions. Resolvers execute normally to provide real data for
    materializing template expressions in inputs.

spec:
  resolvers:
    enabled:
      description: Whether the feature is enabled
      type: bool
      resolve:
        with:
          - provider: static
            inputs:
              value: true

    app_name:
      description: Application name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "my-app"

    replicas:
      description: Number of replicas
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 3

  workflow:
    actions:
      setup:
        description: Initial setup
        provider: exec
        inputs:
          command: echo
          args:
            - "Setting up {{ .app_name }}"

      scale:
        description: Scale the application (only when enabled)
        dependsOn:
          - setup
        when:
          expr: "_.enabled == true"
        provider: exec
        inputs:
          command: echo
          args:
            - "Scaling {{ .app_name }} to {{ .replicas }} replicas"

    finally:
      cleanup:
        description: Cleanup temporary resources
        provider: exec
        inputs:
          command: echo
          args:
            - "Cleaning up after {{ .app_name }}"
