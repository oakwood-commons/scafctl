# Run: scafctl run solution -f examples/dryrun/basic-dryrun.yaml --dry-run
# Run: scafctl run solution -f examples/dryrun/basic-dryrun.yaml --dry-run -o json
# Run: scafctl run solution -f examples/dryrun/basic-dryrun.yaml --dry-run --verbose

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: dryrun-demo
  displayName: Dryrun Demo
  category: developer-tools
  tags:
    - dry-run
    - preview
  description: |
    Dry-run WhatIf report showing what a solution would do without performing
    side effects. Resolvers execute normally (side-effect-free) to provide
    real data for accurate WhatIf messages.

spec:
  resolvers:
    greeting:
      description: Greeting message
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "Hello, World!"

    target:
      description: Deployment target
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "staging"

    port:
      description: Service port
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 8080

    endpoint:
      description: Computed service endpoint
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'https://' + _.target + '.example.com:' + string(_.port)"

  workflow:
    actions:
      greet:
        description: Print greeting
        provider: exec
        inputs:
          command: echo
          args:
            - "{{ .greeting }}"

      deploy:
        description: Deploy service to target
        dependsOn:
          - greet
        provider: exec
        inputs:
          command: echo
          args:
            - "Deploying to {{ .endpoint }}"
