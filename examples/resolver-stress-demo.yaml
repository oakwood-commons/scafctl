# Run: scafctl run resolver -f resolver-stress-demo.yaml
# Run: scafctl run resolver -f resolver-stress-demo.yaml --progress
# Run: scafctl run resolver -f resolver-stress-demo.yaml --log-level 1
# Run: scafctl run resolver -f resolver-stress-demo.yaml -r deployment_mode=canary
#
# Features demonstrated:
#
# | Category       | Feature                      | Example Resolver(s)                          |
# |----------------|------------------------------|----------------------------------------------|
# | Metadata       | type: string                 | environment, primary_region                  |
# | Metadata       | type: int                    | base_port, replica_count                     |
# | Metadata       | type: any                    | feature_flags, health_check_endpoints        |
# | Metadata       | type: array                  | service_endpoints                            |
# | Metadata       | displayName, example         | environment, team_email                      |
# | Metadata       | sensitive                    | database_connection_string, cache_conn...    |
# | Metadata       | timeout                      | environment                                  |
# |----------------|------------------------------|----------------------------------------------|
# | Resolve        | when (phase-level)           | team_email                                   |
# | Resolve        | until (stop condition)       | team_email                                   |
# | Resolve        | source-level when            | team_email                                   |
# | Resolve        | source-level onError         | team_email                                   |
# | Resolve        | multiple sources (fallback)  | team_email                                   |
# |----------------|------------------------------|----------------------------------------------|
# | Transform      | when (phase-level)           | log_level                                    |
# | Transform      | step-level when              | log_level                                    |
# | Transform      | step-level onError           | log_level                                    |
# | Transform      | __self reference             | cost_center                                  |
# | Transform      | forEach item/index aliases   | dns_records                                  |
# | Transform      | forEach concurrency          | service_endpoints                            |
# | Transform      | forEach in (custom source)   | endpoint_health_summaries                    |
# |----------------|------------------------------|----------------------------------------------|
# | Validate       | match (regex)                | primary_region, cluster_name, base_domain    |
# | Validate       | notMatch (negative regex)    | environment, storage_bucket                  |
# | Validate       | expression (CEL)             | base_port, replica_count                     |
# | Validate       | multiple validations         | storage_bucket                               |
# | Validate       | dynamic message (tmpl)       | storage_bucket                               |
# | Validate       | dynamic message (expr)       | database_name, storage_bucket                |
# |----------------|------------------------------|----------------------------------------------|
# | ValueRef       | rslvr (resolver reference)   | service_endpoints                            |
# | ValueRef       | expr (CEL expression)        | team_email, database_name                    |
# | ValueRef       | tmpl (Go template)           | api_gateway_host, storage_bucket             |

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: resolver-stress-demo
  displayName: Resolver Stress Demo
  category: examples
  tags:
    - example
    - performance
    - resolver
  description: |
    Stress test with 50+ resolvers across 4+ execution phases. Demonstrates
    validation, long-running operations, transforms, complex dependencies,
    and multiple providers (static, cel, http, git, sleep, validation, go-template).

spec:
  resolvers:
    # ============================================================================
    # PHASE 1: Base Infrastructure (no dependencies)
    # These resolvers have no dependencies and execute concurrently in Phase 1
    # ============================================================================

    # 1. Environment configuration (demonstrates displayName, example, timeout)
    environment:
      description: Target deployment environment
      displayName: Environment
      type: string
      example: production
      timeout: 30s
      resolve:
        with:
          - provider: static
            inputs:
              value: production
      validate:
        with:
          # Multiple validations: match AND notMatch
          - provider: validation
            inputs:
              match: "^(development|staging|production)$"
              notMatch: "^test$"
              message: "Environment must be development, staging, or production (not test)"

    # 2. Primary region
    primary_region:
      description: Primary deployment region
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate fetching region from config service (200ms)
              expression: "debug.sleep(200, 'us-west-2')"
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z]{2}-[a-z]+-[0-9]$"
              message: "Invalid region format (expected: xx-xxxx-N)"

    # 3. Secondary region
    secondary_region:
      description: Secondary/failover region
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "debug.sleep(150, 'us-east-1')"

    # 4. Cluster name
    cluster_name:
      description: Kubernetes cluster name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: main-cluster
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z][a-z0-9-]{2,62}$"
              message: "Cluster name must be lowercase alphanumeric with hyphens, 3-63 chars"

    # 5. Base domain
    base_domain:
      description: Base domain for all services
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: example.com
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z0-9][a-z0-9.-]+[a-z0-9]$"
              message: "Invalid domain format"

    # 6. Organization ID
    org_id:
      description: Organization identifier
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate org lookup (100ms)
              expression: "debug.sleep(100, 'org-acme-corp-001')"
      validate:
        with:
          - provider: validation
            inputs:
              match: "^org-[a-z0-9-]+$"
              message: "Organization ID must start with 'org-'"

    # 7. Team ID
    team_id:
      description: Team identifier
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: platform-engineering

    # 7b. Optional team email (demonstrates resolve.when, until, multiple sources, source-level when/onError)
    team_email:
      description: Team contact email with fallback chain
      displayName: Team Email
      type: string
      example: platform-engineering@example.com
      resolve:
        # Phase-level when: Only resolve if environment is production
        when:
          expr: "_.environment == 'production'"
        with:
          # Source 1: Try parameter first (with source-level when)
          - provider: static
            when:
              expr: "has(_.team_id)"  # Only try if team_id exists
            inputs:
              value: null  # Simulates parameter not provided
            onError: continue  # Continue to next source on failure
          # Source 2: Try environment variable
          - provider: static
            inputs:
              value: null  # Simulates env var not set
            onError: continue
          # Source 3: Compute from team_id (final fallback)
          - provider: cel
            inputs:
              expression: "_.team_id + '@example.com'"
        # Stop when we get a non-null value
        until:
          expr: "__self != null"

    # 8. Cost center (demonstrates transform with __self - Bug 1 fix)
    cost_center:
      description: Cost center for billing
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: cc-12345
      transform:
        with:
          - provider: cel
            inputs:
              expression: "__self.upperAscii()"

    # 9. Base port
    base_port:
      description: Base port number for services
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 8000
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self >= 1024 && __self <= 49151"
              message: "Base port must be in registered port range (1024-49151)"

    # 10. Replica count
    replica_count:
      description: Default replica count for services
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 3
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self >= 1 && __self <= 100"
              message: "Replica count must be between 1 and 100"

    # 11. Log level (demonstrates transform.when, step-level when, onError)
    log_level:
      description: Default logging level
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: INFO
      transform:
        # Phase-level when: Only transform in non-development environments
        when:
          expr: "_.environment != 'development'"
        with:
          # Step 1: Convert to lowercase (always runs)
          - provider: cel
            inputs:
              expression: "__self.lowerAscii()"
          # Step 2: Conditional prefix for production (step-level when)
          - provider: cel
            when:
              expr: "_.environment == 'production'"
            inputs:
              expression: "'prod-' + __self"
            onError: continue  # Continue even if this step fails
      validate:
        with:
          - provider: validation
            inputs:
              match: "^(prod-)?(debug|info|warn|error)$"
              message: "Log level must be debug, info, warn, or error (optionally prefixed with prod-)"

    # 12. Feature flags (simulates feature flag service call)
    feature_flags:
      description: Feature flags from configuration service
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate feature flag service call (300ms)
              expression: |
                debug.sleep(300, {
                  'enableNewUI': true,
                  'enableMetrics': true,
                  'enableTracing': true,
                  'enableRateLimiting': false,
                  'maxRequestSize': 10485760
                })

    # 13. HTTP request info (demonstrates http provider with httpbin.org)
    http_request_info:
      description: Fetch request metadata from httpbin.org (demonstrates http provider)
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://httpbin.org/get?demo=scafctl&version=2.0"
              method: GET
              timeout: 30

    # 14. Unique request ID (demonstrates http provider with UUID endpoint)
    unique_request_id:
      description: Generate unique ID via httpbin.org UUID endpoint
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://httpbin.org/uuid"
              method: GET
              timeout: 10

    # 15. HTTP headers inspection (demonstrates http provider headers endpoint)
    http_headers_info:
      description: Inspect HTTP headers via httpbin.org
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://httpbin.org/headers"
              method: GET
              timeout: 10

    # 16. Git repository info (demonstrates git provider)
    git_repo_info:
      description: Get current git branch and status
      type: any
      resolve:
        with:
          - provider: git
            inputs:
              operation: branch
              path: "."

    # 17. Simulated external service delay (demonstrates sleep provider)
    external_service_warmup:
      description: Simulate waiting for external service warmup
      type: any
      resolve:
        with:
          - provider: sleep
            inputs:
              duration: "500ms"

    # 18. Rate limit pause (demonstrates sleep provider with shorter duration)
    rate_limit_pause:
      description: Simulate rate limiting pause between API calls
      type: any
      resolve:
        with:
          - provider: sleep
            inputs:
              duration: "100ms"

    # 19. HTTP request with custom headers (demonstrates map input for headers - Bug 3 fix)
    http_with_custom_headers:
      description: HTTP request with custom headers (demonstrates map inputs)
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://httpbin.org/headers"
              method: GET
              timeout: 15
              headers:
                X-Custom-Header: "scafctl-demo"
                X-Request-Source: "resolver-stress-demo"
                Accept: "application/json"

    # 20. Parameter provider demo (demonstrates parameter provider - Bug 2 fix)
    # Run with: scafctl run resolver -f resolver-stress-demo.yaml -r deployment_mode=canary
    deployment_mode:
      description: Deployment mode from CLI parameter (defaults to 'rolling' if not provided)
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: rolling

    # ============================================================================
    # PHASE 2: Service Configurations (depends on Phase 1)
    # These resolvers depend on Phase 1 resolvers
    # ============================================================================

    # 21. API Gateway configuration (demonstrates tmpl: Go template ValueRef)
    api_gateway_host:
      description: API Gateway hostname
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              # Using Go template (tmpl:) instead of CEL expression
              value:
                tmpl: "api.{{ .environment }}.{{ .base_domain }}"
              expression: "'api.' + _.environment + '.' + _.base_domain"
      validate:
        with:
          - provider: validation
            inputs:
              expression: "size(__self) <= 253"
              message: "Hostname exceeds maximum DNS length"

    # 20. API Gateway port
    api_gateway_port:
      description: API Gateway port
      type: int
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.base_port"

    # 21. Auth service host
    auth_service_host:
      description: Authentication service hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'auth.' + _.environment + '.' + _.base_domain"

    # 22. Auth service port
    auth_service_port:
      description: Authentication service port
      type: int
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.base_port + 1"

    # 23. User service host
    user_service_host:
      description: User service hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'users.' + _.environment + '.' + _.base_domain"

    # 24. User service port
    user_service_port:
      description: User service port
      type: int
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.base_port + 2"

    # 25. Database host (simulates DNS lookup)
    database_host:
      description: Primary database hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate DNS resolution (250ms)
              expression: "debug.sleep(250, 'db.' + _.primary_region + '.' + _.base_domain)"

    # 26. Database port
    database_port:
      description: Database port
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 5432

    # 27. Database name (demonstrates dynamic validation message with expr)
    database_name:
      description: Database name based on environment
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.cluster_name + '_' + _.environment + '_db'"
      validate:
        with:
          - provider: validation
            inputs:
              match: "^[a-z][a-z0-9_-]{0,62}$"
              # Dynamic message using CEL expression
              message:
                expr: "'Invalid database name format: ' + __self + ' (must be lowercase, 1-63 chars)'"

    # 28. Cache host (simulates service discovery)
    cache_host:
      description: Redis cache hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate service discovery (200ms)
              expression: "debug.sleep(200, 'redis.' + _.primary_region + '.' + _.base_domain)"

    # 29. Cache port
    cache_port:
      description: Redis cache port
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 6379

    # 30. Message queue host
    message_queue_host:
      description: Message queue hostname
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate service discovery (180ms)
              expression: "debug.sleep(180, 'mq.' + _.primary_region + '.' + _.base_domain)"

    # 31. Message queue port
    message_queue_port:
      description: Message queue port
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 5672

    # 32. Storage bucket name (demonstrates multiple validations with tmpl: message)
    storage_bucket:
      description: Cloud storage bucket name
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.org_id + '-' + _.environment + '-storage'"
      validate:
        with:
          # Validation 1: Pattern check
          - provider: validation
            inputs:
              match: "^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$"
              # Dynamic message using Go template (tmpl:)
              message:
                tmpl: "Bucket name '{{ .__self }}' has invalid format (must be 3-63 lowercase chars)"
          # Validation 2: No consecutive dots
          - provider: validation
            inputs:
              notMatch: "\\.\\."
              message: "Bucket name cannot contain consecutive dots"
          # Validation 3: Length check with CEL expression
          - provider: validation
            inputs:
              expression: "size(__self) >= 3 && size(__self) <= 63"
              message:
                expr: "'Bucket name must be 3-63 characters, got ' + string(size(__self))"

    # ============================================================================
    # PHASE 3: Integration and Networking (depends on Phase 2)
    # These resolvers depend on Phase 2 resolvers
    # ============================================================================

    # 33. Database connection string
    database_connection_string:
      description: Full database connection string
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'postgresql://app_user:***@' + _.database_host + ':' + string(_.database_port) + '/' + _.database_name"

    # 34. Cache connection string
    cache_connection_string:
      description: Redis connection string
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'redis://' + _.cache_host + ':' + string(_.cache_port) + '/0'"

    # 35. Message queue connection string
    mq_connection_string:
      description: Message queue connection string
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'amqp://app:***@' + _.message_queue_host + ':' + string(_.message_queue_port)"

    # 36. API Gateway URL
    api_gateway_url:
      description: Full API Gateway URL
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'https://' + _.api_gateway_host + ':' + string(_.api_gateway_port)"
      validate:
        with:
          - provider: validation
            inputs:
              match: "^https://"
              message: "API Gateway must use HTTPS"

    # 36b. Service Configuration Summary (demonstrates go-template provider)
    service_config_summary:
      description: Human-readable service configuration summary using go-template
      type: string
      resolve:
        with:
          - provider: go-template
            inputs:
              name: service-config-summary
              template: |
                Service Configuration Summary
                =============================
                Environment: {{.environment}}
                Region: {{.primary_region}} (failover: {{.secondary_region}})
                Cluster: {{.cluster_name}}
                Domain: {{.base_domain}}

                Services:
                  - API Gateway: {{.api_gateway_host}}:{{.api_gateway_port}}
                  - Auth Service: {{.auth_service_host}}:{{.auth_service_port}}
                  - User Service: {{.user_service_host}}:{{.user_service_port}}

                Database:
                  - Host: {{.database_host}}
                  - Port: {{.database_port}}
                  - Name: {{.database_name}}

    # 37. Auth service URL
    auth_service_url:
      description: Authentication service URL
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'https://' + _.auth_service_host + ':' + string(_.auth_service_port)"

    # 38. User service URL
    user_service_url:
      description: User service URL
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "'https://' + _.user_service_host + ':' + string(_.user_service_port)"

    # 39. Health check endpoints (simulates endpoint discovery)
    health_check_endpoints:
      description: Health check endpoints for all services
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate service registry query (350ms)
              expression: |
                debug.sleep(350, {
                  'apiGateway': _.api_gateway_url + '/health',
                  'authService': _.auth_service_url + '/health',
                  'userService': _.user_service_url + '/health'
                })

    # 40. Service mesh configuration
    service_mesh_config:
      description: Service mesh sidecar configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'enabled': _.environment == 'production',
                  'mtls': _.environment == 'production',
                  'tracing': _.feature_flags.enableTracing,
                  'metricsPort': 15090
                }

    # 41. Load balancer configuration
    load_balancer_config:
      description: Load balancer settings
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'algorithm': 'round_robin',
                  'healthCheckPath': '/health',
                  'healthCheckInterval': 30,
                  'timeout': 60,
                  'maxConnections': 10000
                }

    # 42. DNS records needed (demonstrates forEach transform with index alias)
    dns_records:
      description: DNS records to be created
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                [
                  {'name': _.api_gateway_host, 'type': 'A', 'ttl': 300},
                  {'name': _.auth_service_host, 'type': 'A', 'ttl': 300},
                  {'name': _.user_service_host, 'type': 'A', 'ttl': 300},
                  {'name': _.database_host, 'type': 'CNAME', 'ttl': 600},
                  {'name': _.cache_host, 'type': 'CNAME', 'ttl': 600}
                ]
      transform:
        with:
          # forEach: Iterate over DNS records and add metadata to each
          - forEach:
              item: record    # Creates both __item AND record
              index: i        # Creates both __index AND i
            provider: cel
            inputs:
              # Add priority and id to each record using iteration variables
              expression: |
                map.merge(record, {
                  'priority': i + 1,
                  'id': 'dns-' + string(i),
                  'zone': _.base_domain
                })

    # 43. Network policies
    network_policies:
      description: Network security policies
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate policy engine query (280ms)
              expression: |
                debug.sleep(280, {
                  'allowIngressFromGateway': true,
                  'allowEgressToDatabase': true,
                  'allowEgressToCache': true,
                  'allowEgressToMQ': true,
                  'denyAllOther': _.environment == 'production'
                })

    # 44. TLS certificate configuration
    tls_config:
      description: TLS/SSL certificate configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'enabled': true,
                  'minVersion': 'TLS1.2',
                  'cipherSuites': ['TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384', 'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'],
                  'certPath': '/etc/certs/' + _.base_domain + '.crt',
                  'keyPath': '/etc/certs/' + _.base_domain + '.key'
                }

    # 44b. Service endpoints (demonstrates forEach with concurrency limit)
    service_endpoints:
      description: Validated service endpoints with health status
      type: array
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - name: api-gateway
                  host: gateway.internal.example.com
                  port: 8443
                - name: auth-service
                  host: auth.internal.example.com
                  port: 9000
                - name: user-service
                  host: users.internal.example.com
                  port: 9001
      transform:
        with:
          # forEach with concurrency: Limit parallel execution to 2
          - forEach:
              item: svc
              index: idx
              concurrency: 2   # Only 2 parallel operations at a time
            provider: cel
            inputs:
              # Build full endpoint config for each service
              # Note: When using dynamic variables (like forEach aliases), wrap string
              # concatenations in  to ensure homogeneous types in map literals.
              expression: |
                {
                  'name': svc.name,
                  'url': 'https://' + string(svc.host + ':' + string(svc.port)),
                  'healthEndpoint': 'https://' + string(svc.host + ':' + string(svc.port) + '/health'),
                  'order': idx,
                  'environment': _.environment,
                  'region': _.primary_region
                }

    # 44c. Endpoint health summaries (demonstrates forEach.in - iterating over different resolver)
    endpoint_health_summaries:
      description: Health summary for each service endpoint
      type: array
      resolve:
        with:
          - provider: static
            inputs:
              value: "initializing"
      transform:
        with:
          # forEach with 'in': Iterate over service_endpoints resolver (not __self)
          - forEach:
              item: endpoint
              index: idx
              in:
                rslvr: service_endpoints  # Iterate over a different resolver's value
            provider: cel
            inputs:
              expression: |
                {
                  'serviceName': endpoint.name,
                  'healthUrl': endpoint.healthEndpoint,
                  'checkOrder': idx,
                  'expectedStatus': 'healthy'
                }

    # ============================================================================
    # PHASE 4: Final Aggregated Configurations (depends on Phase 3)
    # These resolvers aggregate everything into final configurations
    # ============================================================================

    # 45. API Gateway final config
    api_gateway_config:
      description: Complete API Gateway configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate config compilation (150ms)
              expression: |
                debug.sleep(150, {
                  'name': 'api-gateway',
                  'host': _.api_gateway_host,
                  'port': _.api_gateway_port,
                  'url': _.api_gateway_url,
                  'replicas': _.replica_count,
                  'loadBalancer': _.load_balancer_config,
                  'tls': _.tls_config,
                  'healthCheck': _.health_check_endpoints.apiGateway,
                  'features': _.feature_flags
                })

    # 46. Auth service final config
    auth_service_config:
      description: Complete authentication service configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                debug.sleep(120, {
                  'name': 'auth-service',
                  'host': _.auth_service_host,
                  'port': _.auth_service_port,
                  'url': _.auth_service_url,
                  'replicas': _.replica_count,
                  'database': _.database_connection_string,
                  'cache': _.cache_connection_string,
                  'healthCheck': _.health_check_endpoints.authService,
                  'logLevel': _.log_level
                })

    # 47. User service final config
    user_service_config:
      description: Complete user service configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                debug.sleep(130, {
                  'name': 'user-service',
                  'host': _.user_service_host,
                  'port': _.user_service_port,
                  'url': _.user_service_url,
                  'replicas': _.replica_count,
                  'database': _.database_connection_string,
                  'cache': _.cache_connection_string,
                  'messageQueue': _.mq_connection_string,
                  'healthCheck': _.health_check_endpoints.userService,
                  'logLevel': _.log_level
                })

    # 48. Database final config
    database_config:
      description: Complete database configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'host': _.database_host,
                  'port': _.database_port,
                  'name': _.database_name,
                  'connectionString': _.database_connection_string,
                  'maxConnections': 100,
                  'minConnections': 10,
                  'connectionTimeout': 30,
                  'idleTimeout': 300
                }

    # 49. Cache final config
    cache_config:
      description: Complete cache configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'host': _.cache_host,
                  'port': _.cache_port,
                  'connectionString': _.cache_connection_string,
                  'maxMemory': '2gb',
                  'evictionPolicy': 'allkeys-lru',
                  'keyPrefix': _.cluster_name + ':'
                }

    # 50. Message queue final config
    mq_config:
      description: Complete message queue configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'host': _.message_queue_host,
                  'port': _.message_queue_port,
                  'connectionString': _.mq_connection_string,
                  'prefetchCount': 10,
                  'heartbeat': 60,
                  'queues': ['user-events', 'notifications', 'audit-logs']
                }

    # 51. Monitoring configuration (simulates metrics backend discovery)
    monitoring_config:
      description: Monitoring and observability configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate metrics discovery (400ms)
              expression: |
                debug.sleep(400, {
                  'metricsEnabled': _.feature_flags.enableMetrics,
                  'tracingEnabled': _.feature_flags.enableTracing,
                  'prometheusEndpoint': '/metrics',
                  'prometheusPort': 9090,
                  'jaegerEndpoint': 'http://jaeger.' + _.primary_region + '.' + _.base_domain + ':14268/api/traces',
                  'alertManager': 'http://alertmanager.' + _.primary_region + '.' + _.base_domain + ':9093',
                  'dashboardUrl': 'https://grafana.' + _.environment + '.' + _.base_domain
                })

    # 52. Security configuration
    security_config:
      description: Security and compliance configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'tls': _.tls_config,
                  'networkPolicies': _.network_policies,
                  'serviceMesh': _.service_mesh_config,
                  'rateLimiting': {
                    'enabled': _.feature_flags.enableRateLimiting,
                    'requestsPerSecond': 1000,
                    'burstSize': 5000
                  },
                  'auditLogging': _.environment == 'production',
                  'encryptionAtRest': true
                }

    # 53. Resource labels
    resource_labels:
      description: Standard labels for all resources
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'app.kubernetes.io/managed-by': 'scafctl',
                  'app.kubernetes.io/environment': _.environment,
                  'app.kubernetes.io/region': _.primary_region,
                  'app.kubernetes.io/cluster': _.cluster_name,
                  'organization': _.org_id,
                  'team': _.team_id,
                  'cost-center': _.cost_center
                }

    # 54. Deployment manifest (simulates template rendering)
    deployment_manifest:
      description: Kubernetes deployment manifest data
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Simulate manifest generation (500ms)
              expression: |
                debug.sleep(500, {
                  'apiVersion': 'apps/v1',
                  'kind': 'Deployment',
                  'metadata': {
                    'name': _.cluster_name + '-deployment',
                    'labels': _.resource_labels
                  },
                  'spec': {
                    'replicas': _.replica_count,
                    'selector': {
                      'matchLabels': {
                        'app': _.cluster_name
                      }
                    }
                  }
                })

    # 55. Infrastructure summary
    infrastructure_summary:
      description: Summary of all infrastructure components
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                {
                  'environment': _.environment,
                  'regions': {
                    'primary': _.primary_region,
                    'secondary': _.secondary_region
                  },
                  'cluster': _.cluster_name,
                  'organization': _.org_id,
                  'team': _.team_id,
                  'services': {
                    'apiGateway': _.api_gateway_config,
                    'authService': _.auth_service_config,
                    'userService': _.user_service_config
                  },
                  'datastores': {
                    'database': _.database_config,
                    'cache': _.cache_config,
                    'messageQueue': _.mq_config
                  },
                  'networking': {
                    'dns': _.dns_records,
                    'loadBalancer': _.load_balancer_config
                  },
                  'security': _.security_config,
                  'monitoring': _.monitoring_config,
                  'labels': _.resource_labels,
                  'httpMetadata': _.http_request_info,
                  'requestId': _.unique_request_id,
                  'gitInfo': _.git_repo_info
                }

# 58. Final validation status (validates entire configuration)
    validation_status:
      description: Overall configuration validation status
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              # Final validation check (100ms)
              expression: |
                debug.sleep(100, {
                  'valid': true,
                  'timestamp': '2026-01-27T12:00:00Z',
                  'resolverCount': 58,
                  'environment': _.environment,
                  'cluster': _.cluster_name,
                  'region': _.primary_region,
                  'providersUsed': [
                    'static',
                    'cel',
                    'http',
                    'git',
                    'sleep',
                    'validation'
                  ],
                  'featuresUsed': [
                    'transforms_with_self',
                    'map_inputs_for_headers',
                    'parameter_provider',
                    'forEach_iteration',
                    'forEach_concurrency',
                    'forEach_aliases',
                    'forEach_in_custom_source',
                    'displayName_and_example',
                    'resolver_timeout',
                    'resolve_when_phase_condition',
                    'resolve_until_stop_condition',
                    'source_level_when',
                    'source_level_onError_continue',
                    'multiple_source_fallback_chain',
                    'transform_when_phase_condition',
                    'transform_step_when',
                    'transform_step_onError',
                    'validation_match_and_notMatch',
                    'multiple_validations_per_resolver',
                    'dynamic_message_tmpl',
                    'dynamic_message_expr',
                    'valueref_tmpl_go_template',
                    'valueref_rslvr_reference',
                    'valueref_expr_cel'
                  ],
                  'checksCompleted': [
                    'environment_validation',
                    'dns_validation', 
                    'security_policy_check',
                    'resource_quota_check',
                    'dependency_resolution',
                    'http_connectivity_check',
                    'git_repo_check',
                    'transform_validation'
                  ]
                })
      validate:
        with:
          - provider: validation
            inputs:
              expression: "__self.valid == true"
              message: "Configuration validation failed"
