# Production API server configuration.
# Enables Entra OIDC authentication, TLS, audit logging, and tracing.
apiServer:
  host: "0.0.0.0"
  port: 8443
  apiVersion: "v1"
  shutdownTimeout: "30s"
  requestTimeout: "60s"
  maxRequestSize: 10485760
  maxConcurrent: 1000
  tls:
    enabled: true
    cert: "/etc/ssl/certs/api-cert.pem"
    key: "/etc/ssl/private/api-key.pem"
  cors:
    enabled: true
    allowedOrigins:
      - "https://app.example.com"
    allowedMethods:
      - "GET"
      - "POST"
    allowedHeaders:
      - "Authorization"
      - "Content-Type"
    maxAge: 3600
  rateLimit:
    global:
      maxRequests: 100
      window: "1m"
    endpoints:
      "/v1/solutions/run":
        maxRequests: 10
        window: "1m"
  auth:
    azureOIDC:
      enabled: true
      tenantId: "00000000-0000-0000-0000-000000000000"
      clientId: "00000000-0000-0000-0000-000000000000"
  compression:
    level: 6
  audit:
    enabled: true
  tracing:
    enabled: true

telemetry:
  endpoint: "otel-collector:4317"
  samplerType: "traceidratio"
  samplerArg: 0.1
