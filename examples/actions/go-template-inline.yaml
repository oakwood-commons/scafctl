# Go Template Rendering Example
# Demonstrates using Go templates inline (without external files) for
# generating structured text output from resolver data.
#
# This example shows:
# - Inline Go templates in resolver transforms
# - Conditional rendering with {{if}}/{{else}}
# - Looping with {{range}}
# - Using the tmpl field for dynamic inputs
# - Custom delimiters
#
# Run: scafctl run solution -f examples/actions/go-template-inline.yaml
#
# After running, check the output:
#   cat /tmp/scafctl-demo/readme.md

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: go-template-inline
  version: 1.0.0
  description: Demonstrates inline Go template rendering patterns

spec:
  resolvers:
    project_name:
      description: Project name
      type: string
      resolve:
        with:
          - provider: parameter
            inputs:
              key: name
          - provider: static
            inputs:
              value: "my-project"

    language:
      description: Programming language
      type: string
      resolve:
        with:
          - provider: parameter
            inputs:
              key: lang
          - provider: static
            inputs:
              value: "Go"

    features:
      description: List of project features
      type: array
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - title: "REST API"
                  enabled: true
                - title: "GraphQL"
                  enabled: false
                - title: "WebSocket"
                  enabled: true
                - title: "gRPC"
                  enabled: true

    contributors:
      description: Project contributors
      type: array
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - "Alice"
                - "Bob"
                - "Charlie"

    # Render a README using an inline Go template
    readme_content:
      description: Generated README content
      type: string
      dependsOn:
        - project_name
        - language
        - features
        - contributors
      resolve:
        with:
          - provider: go-template
            inputs:
              name: "readme"
              template: |
                # {{ .project_name }}

                A {{ .language }} project.

                ## Features

                | Feature | Status |
                |---------|--------|
                {{- range $item := .features }}
                | {{ $item.title }} | {{ if $item.enabled }}✅ Enabled{{ else }}❌ Disabled{{ end }} |
                {{- end }}

                ## Contributors

                {{- range $c := .contributors }}
                - {{ $c }}
                {{- end }}

                ---
                *Generated by scafctl*

  workflow:
    actions:
      write-readme:
        description: Write generated README to disk
        displayName: Write README
        provider: file
        inputs:
          operation: "write"
          path: "/tmp/scafctl-demo/readme.md"
          content:
            expr: "_.readme_content"
          createDirs: true

      show-readme:
        description: Display the generated README
        displayName: Show README
        provider: exec
        dependsOn:
          - write-readme
        inputs:
          command: "cat /tmp/scafctl-demo/readme.md"
