# Run: scafctl run solution -f examples/actions/template-render.yaml
#
# After running: cat /tmp/scafctl-demo/config.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: template-render
  version: 1.0.0
  description: |
    Real-world workflow that reads a Go template from the filesystem,
    renders it with configuration data, and writes the output. Demonstrates
    file provider, go-template provider, chained resolver dependencies,
    and CEL expressions for dynamic paths.

spec:
  resolvers:
    # Application configuration
    app_name:
      description: Application name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "my-service"
    
    # Target environment
    environment:
      description: Target environment (staging, production)
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "staging"
    
    # Output directory for generated files
    output_dir:
      description: Directory for generated config files
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "/tmp/scafctl-demo"
    
    # Server configuration
    server:
      description: Server configuration settings
      type: any
      resolve:
        with:
          - provider: static
            inputs:
              value:
                host: "0.0.0.0"
                port: 8080
                tls_enabled: true
    
    # Database configuration
    database:
      description: Database connection settings
      type: any
      resolve:
        with:
          - provider: static
            inputs:
              value:
                host: "db.example.com"
                port: 5432
                name: "myservice_db"
    
    # Feature flags
    features:
      description: Feature flags for the application
      type: any
      resolve:
        with:
          - provider: static
            inputs:
              value:
                enable_metrics: true
                enable_tracing: true
                enable_cache: false
    
    # Current timestamp for the generated file
    timestamp:
      description: Generation timestamp
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "time.nowFmt('2006-01-02T15:04:05Z')"
    
    # Read the template file from the filesystem
    template_content:
      description: Raw template content read from file
      type: any
      resolve:
        with:
          - provider: file
            inputs:
              operation: "read"
              path: "examples/actions/template-render/config.yaml.tmpl"
    
    # Render the template with all the configuration data
    rendered_config:
      description: Rendered configuration content
      type: string
      dependsOn:
        - template_content
        - app_name
        - environment
        - server
        - database
        - features
        - timestamp
      resolve:
        with:
          - provider: go-template
            inputs:
              name: "config-yaml"
              template:
                expr: "_.template_content.content"
              missingKey: "error"

  workflow:
    actions:
      # Ensure output directory exists
      create-output-dir:
        description: Create the output directory
        displayName: Create Output Directory
        provider: exec
        inputs:
          command:
            expr: "'mkdir -p ' + _.output_dir"
      
      # Write the rendered configuration to file
      write-config:
        description: Write rendered config to filesystem
        displayName: Write Configuration
        provider: file
        dependsOn:
          - create-output-dir
        inputs:
          operation: "write"
          path:
            expr: "_.output_dir + '/config.yaml'"
          content:
            expr: "_.rendered_config"
          createDirs: true
      
      # Verify the file was written successfully
      verify-output:
        description: Verify the output file exists and show content
        displayName: Verify Output
        provider: exec
        dependsOn:
          - write-config
        inputs:
          command:
            expr: "'echo \"=== Generated Config ===\"; cat ' + _.output_dir + '/config.yaml'"
    
    # Cleanup section (optional - commented out to preserve output for inspection)
    # finally:
    #   cleanup:
    #     description: Clean up generated files
    #     displayName: Cleanup
    #     provider: exec
    #     inputs:
    #       command:
    #         expr: "'rm -rf ' + _.output_dir"
