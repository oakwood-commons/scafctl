# Run: scafctl run solution -f examples/actions/sequential-chain.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: sequential-chain
  version: 1.0.0
  description: Linear action dependency chain (A -> B -> C)

spec:
  resolvers:
    project:
      description: Project name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "my-app"

  workflow:
    actions:
      # Step 1: Checkout code
      checkout:
        description: Checkout source code
        displayName: Checkout
        provider: exec
        inputs:
          command:
            expr: "'echo Checking out ' + _.project + ' code...'"

      # Step 2: Build (depends on checkout)
      build:
        description: Build the project
        displayName: Build
        provider: exec
        dependsOn:
          - checkout
        inputs:
          command:
            expr: "'echo Building ' + _.project + '...'"
        timeout: 10m

      # Step 3: Test (depends on build)
      test:
        description: Run tests
        displayName: Test
        provider: exec
        dependsOn:
          - build
        inputs:
          command:
            expr: "'echo Testing ' + _.project + '...'"
        timeout: 5m

      # Step 4: Package (depends on test)
      package:
        description: Package artifacts
        displayName: Package
        provider: exec
        dependsOn:
          - test
        inputs:
          command:
            expr: "'echo Packaging ' + _.project + '...'"
