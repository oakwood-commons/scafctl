# Setup:
#   mkdir -p /tmp/conflict-demo
#   echo "old config" > /tmp/conflict-demo/config.yaml
#   echo "old readme" > /tmp/conflict-demo/README.md
#   echo "keep me"    > /tmp/conflict-demo/LICENSE
#   printf "dist/\n.env\n" > /tmp/conflict-demo/.gitignore
#
# Run: scafctl run solution -f examples/providers/file-conflict-strategies.yaml --output-dir /tmp/conflict-demo -o json
# Run: scafctl run solution -f examples/providers/file-conflict-strategies.yaml --output-dir /tmp/conflict-demo --dry-run -o json
# Run: scafctl run solution -f examples/providers/file-conflict-strategies.yaml --output-dir /tmp/conflict-demo --on-conflict error

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: file-conflict-strategies-demo
  version: 1.0.0
  description: |
    File provider conflict resolution strategies: skip-unchanged, overwrite,
    skip, error, and append (with line-level deduplication). Includes
    per-entry overrides in write-tree.

spec:
  resolvers:
    app-config:
      description: Generate new config content
      resolve:
        with:
          - provider: static
            inputs:
              value: |
                name: my-project
                version: 2.0.0
                environment: production

    readme-content:
      description: Generate README content
      resolve:
        with:
          - provider: static
            inputs:
              value: |
                # My Project
                Generated by scafctl.

  # ===========================================================================
  # WORKFLOW: Demonstrates each conflict strategy
  # ===========================================================================
  workflow:
    actions:
      # -----------------------------------------------------------------------
      # 1. skip-unchanged (default) — idempotent re-generation
      # -----------------------------------------------------------------------
      # If config.yaml exists with the same content, it is left untouched.
      # If the content differs, the file is overwritten.
      write-config:
        description: Write config with skip-unchanged (default strategy)
        provider: file
        inputs:
          operation: write
          path: config.yaml
          content:
            rslvr: app-config
          # onConflict defaults to skip-unchanged

      # -----------------------------------------------------------------------
      # 2. overwrite — always replace, with backup
      # -----------------------------------------------------------------------
      # README.md is always replaced. The original is saved as README.md.bak.
      overwrite-readme:
        description: Overwrite README with backup
        provider: file
        inputs:
          operation: write
          path: README.md
          content:
            rslvr: readme-content
          onConflict: overwrite
          backup: true

      # -----------------------------------------------------------------------
      # 3. skip — never overwrite existing files
      # -----------------------------------------------------------------------
      # If LICENSE already exists, it is left untouched. Only writes on first run.
      skip-license:
        description: Write LICENSE only if it does not exist
        provider: file
        inputs:
          operation: write
          path: LICENSE
          content: "MIT License\n\nCopyright (c) 2026\n"
          onConflict: skip

      # -----------------------------------------------------------------------
      # 4. append with dedupe — .gitignore management
      # -----------------------------------------------------------------------
      # Appends only lines not already present in .gitignore.
      # If .gitignore already has dist/ and .env, only build/ and node_modules/
      # are added. If all lines exist, the file is unchanged.
      update-gitignore:
        description: Append unique entries to .gitignore
        provider: file
        inputs:
          operation: write
          path: .gitignore
          content: |
            dist/
            build/
            node_modules/
            .env
          onConflict: append
          dedupe: true

      # -----------------------------------------------------------------------
      # 5. write-tree with per-entry overrides
      # -----------------------------------------------------------------------
      # Mixed strategies: each entry can override the invocation default.
      write-project-files:
        description: Write multiple files with per-entry strategy overrides
        provider: file
        inputs:
          operation: write-tree
          basePath: .
          onConflict: skip-unchanged  # default for entries without override
          entries:
            - path: src/main.go
              content: |
                package main

                func main() {}
              # Inherits skip-unchanged from invocation level

            - path: .dockerignore
              content: |
                node_modules/
                dist/
                .git/
              onConflict: append
              dedupe: true
              # Appends unique lines only

            - path: CONTRIBUTING.md
              content: |
                # Contributing
                Please read our guidelines.
              onConflict: skip
              # Never overwrite existing contributing guide

  testing:
    config:
      skipBuiltins: [render-defaults]

    cases:
      basic-run:
        description: Verify solution runs successfully
        command: [run, solution]
        args: ["-o", "json"]
        assertions:
          - expression: __exitCode == 0
          - contains: write-config
