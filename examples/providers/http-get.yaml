# Run: scafctl run solution -f examples/providers/http-get.yaml
# Run: scafctl run resolver -f examples/providers/http-get.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: http-get-example
  displayName: HTTP Get Example
  category: providers
  tags:
    - http
    - provider-example
  description: Simple HTTP GET request using the http provider

spec:
  resolvers:
    response:
      description: HTTP GET response from httpbin
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: https://httpbin.org/get
              method: GET
