# HCL Provider — Parse Terraform Variable Definitions
#
# Demonstrates parsing inline Terraform variable definitions
# and extracting their types, defaults, and validation rules.
#
# Run: scafctl run solution -f examples/providers/hcl-parse-variables.yaml
# Run: scafctl run resolver -f examples/providers/hcl-parse-variables.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: hcl-parse-variables-example
  version: 1.0.0
  description: Parse Terraform content to extract variable definitions

spec:
  resolvers:
    variables:
      description: Parsed Terraform variable definitions
      type: any
      resolve:
        with:
          - provider: hcl
            inputs:
              content: |
                variable "region" {
                  type        = string
                  default     = "us-east-1"
                  description = "AWS region for resources"
                }

                variable "environment" {
                  type    = string
                  default = "dev"

                  validation {
                    condition     = contains(["dev", "staging", "prod"], var.environment)
                    error_message = "Must be one of: dev, staging, prod."
                  }
                }
