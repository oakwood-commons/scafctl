# Run: scafctl run solution -f examples/providers/exec-ls.yaml
# Run: scafctl run resolver -f examples/providers/exec-ls.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: exec-ls-example
  displayName: Exec Ls Example
  category: providers
  tags:
    - exec
    - provider-example
  description: List directory contents using the exec provider

spec:
  resolvers:
    listing:
      description: Directory listing via exec provider
      type: any
      resolve:
        with:
          - provider: exec
            inputs:
              command: ls
              args:
                - "-la"
