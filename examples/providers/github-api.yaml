# Prerequisites: scafctl auth login github
#
# Run: scafctl run solution -f examples/providers/github-api.yaml
# Run: scafctl run resolver -f examples/providers/github-api.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: github-api-example
  displayName: GitHub API Example
  category: providers
  tags:
    - github
    - provider-example
  description: |
    GitHub API call with authentication via the http provider.
    Demonstrates automatic token injection for authenticated requests.

spec:
  resolvers:
    github-user:
      description: Authenticated GitHub user profile
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: https://api.github.com/user
              method: GET
              headers:
                Accept: application/json
              auth: github
              scope: "read:user"
