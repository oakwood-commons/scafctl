# HTTP Provider — OData / Microsoft Graph Pagination
#
# Demonstrates pagination by following @odata.nextLink URL from the
# response body. Common for Microsoft Graph, Dynamics 365, and OData APIs.
#
# Prerequisites:
#   scafctl auth login entra --scope https://graph.microsoft.com/.default
#
# Run: scafctl run solution -f examples/providers/http-pagination-odata.yaml
# Run: scafctl run resolver -f examples/providers/http-pagination-odata.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: http-pagination-odata-example
  version: 1.0.0
  description: OData pagination follows @odata.nextLink URLs

spec:
  resolvers:
    users:
      description: Users fetched via OData nextLink pagination
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://graph.microsoft.com/v1.0/users?$top=100"
              method: GET
              authProvider: entra
              scope: "https://graph.microsoft.com/.default"
              pagination:
                strategy: cursor
                maxPages: 50
                nextURLPath: "body['@odata.nextLink']"
                collectPath: "body.value"
