# Prerequisites: scafctl auth login github
#
# Run: scafctl run solution -f examples/providers/github-provider.yaml
# Run: scafctl run resolver -f examples/providers/github-provider.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: github-provider-example
  displayName: GitHub Provider Example
  category: providers
  tags:
    - github
    - provider-example
  description: |
    GitHub provider for reading repository data via GraphQL. Supports
    get_repo, list_branches, list_tags, list_releases, and write operations.

spec:
  resolvers:
    repo-info:
      description: Repository information from GitHub GraphQL API
      type: any
      resolve:
        with:
          - provider: github
            inputs:
              operation: get_repo
              owner: cli
              repo: cli
