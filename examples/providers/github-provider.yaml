# GitHub Provider — Repository Information
#
# Demonstrates the GitHub provider for reading repository data via GraphQL.
# Supports operations: get_repo, list_branches, list_tags, list_releases,
# and write operations (issues, PRs, commits, branches, tags, releases).
#
# Prerequisites:
#   scafctl auth login github
#
# Run: scafctl run solution -f examples/providers/github-provider.yaml
# Run: scafctl run resolver -f examples/providers/github-provider.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: github-provider-example
  version: 1.0.0
  description: GitHub provider — read repository info via GraphQL

spec:
  resolvers:
    repo-info:
      description: Repository information from GitHub GraphQL API
      type: any
      resolve:
        with:
          - provider: github
            inputs:
              operation: get_repo
              owner: cli
              repo: cli
