# Prerequisites: scafctl auth login entra
#
# Run: scafctl run solution -f examples/providers/identity-status.yaml
# Run: scafctl run resolver -f examples/providers/identity-status.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: identity-status-example
  displayName: Identity Status Example
  category: providers
  tags:
    - identity
    - provider-example
  description: Check Entra authentication status

spec:
  resolvers:
    auth-status:
      description: Current Entra authentication status
      type: any
      resolve:
        with:
          - provider: identity
            inputs:
              operation: status
              handler: entra
