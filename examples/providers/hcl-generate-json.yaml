# HCL Provider — Generate Terraform JSON (.tf.json)
#
# Demonstrates generating Terraform JSON from structured block data.
# Produces .tf.json format instead of standard HCL.
#
# Run: scafctl run solution -f examples/providers/hcl-generate-json.yaml
# Run: scafctl run resolver -f examples/providers/hcl-generate-json.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: hcl-generate-json-example
  version: 1.0.0
  description: Generate Terraform JSON (.tf.json) from structured block data

spec:
  resolvers:
    generated-json:
      description: Generated Terraform JSON content
      type: any
      resolve:
        with:
          - provider: hcl
            inputs:
              operation: generate
              output_format: json
              blocks:
                variables:
                  - name: region
                    type: string
                    default: us-east-1
                    description: "AWS region"
                  - name: env
                    type: string
                    default: dev
                    description: "Environment name"
                resources:
                  - type: aws_instance
                    name: web
                    attributes:
                      ami: ami-12345
                      instance_type: t3.micro
                      tags:
                        Name: web-server
                        Environment: prod
                outputs:
                  - name: instance_id
                    value: aws_instance.web.id
                    description: "The instance ID"
