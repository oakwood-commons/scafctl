# Prerequisites: scafctl auth login entra --scope https://graph.microsoft.com/.default
#
# Run: scafctl run solution -f examples/providers/http-entra.yaml
# Run: scafctl run resolver -f examples/providers/http-entra.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: http-entra-example
  displayName: HTTP Entra Example
  category: providers
  tags:
    - entra
    - http
    - provider-example
  description: Microsoft Graph API call with Entra authentication

spec:
  resolvers:
    user-profile:
      description: Current user profile from Microsoft Graph
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: https://graph.microsoft.com/v1.0/me
              method: GET
              headers:
                Accept: application/json
              auth: entra
              scope: "https://graph.microsoft.com/.default"
