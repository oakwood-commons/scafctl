# Run: scafctl run solution -f examples/providers/http-autoparse.yaml
# Run: scafctl run resolver -f examples/providers/http-autoparse.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: http-autoparse-example
  displayName: HTTP Autoparse Example
  category: providers
  tags:
    - http
    - provider-example
  description: |
    HTTP provider with automatic JSON response parsing. Returns a structured
    object instead of a raw string body, enabling direct field access.

spec:
  resolvers:
    parsed-response:
      description: Parsed JSON response from httpbin
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: https://httpbin.org/get
              method: GET
              autoParseJson: true
