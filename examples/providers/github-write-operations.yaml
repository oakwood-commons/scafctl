# Prerequisites: scafctl auth login github
# Warning: Write operations modify real repositories. Use with care.
#
# Run: scafctl run solution -f examples/providers/github-write-operations.yaml
# Run: scafctl run resolver -f examples/providers/github-write-operations.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: github-write-operations-example
  version: 1.0.0
  description: |
    GitHub provider write operations: issues, PRs, commits, branches, tags,
    releases, repo management, rulesets, and security settings.
    Commits are automatically GPG-signed via createCommitOnBranch.

spec:
  resolvers:
    # Safe read operation (default active example)
    branches:
      description: List branches (safe read operation)
      type: any
      resolve:
        with:
          - provider: github
            inputs:
              operation: list_branches
              owner: cli
              repo: cli

    # Write operation examples (commented - uncomment to use)
    #
    # Create an issue:
    #   new-issue:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_issue
    #             owner: my-org
    #             repo: my-repo
    #             title: "Bug: something is broken"
    #             body: "Steps to reproduce..."
    #             labels:
    #               - bug
    #               - priority/high
    #
    # Create a pull request:
    #   new-pr:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_pull_request
    #             owner: my-org
    #             repo: my-repo
    #             title: "feat: add new scaffolding templates"
    #             body: "This PR adds new templates."
    #             head: feature-branch
    #             base: main
    #             draft: true
    #
    # Create a signed commit:
    #   signed-commit:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_commit
    #             owner: my-org
    #             repo: my-repo
    #             branch: feature-branch
    #             message: "feat: add scaffolded project files"
    #             expected_head_oid: abc123def456789012345678901234567890abcd
    #             additions:
    #               - path: src/main.go
    #                 content: "package main"
    #
    # Create a release:
    #   new-release:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_release
    #             owner: my-org
    #             repo: my-repo
    #             tag_name: v1.0.0
    #             name: "Release 1.0.0"
    #             body: "First stable release"
    #             prerelease: false
    #             target_commitish: main
    #
    # Create a repository (GraphQL, REST fallback for EMU):
    #   new-repo:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_repo
    #             owner: my-org
    #             repo: my-new-repo
    #             description: "A new project"
    #             visibility: private
    #             auto_init: true
    #
    # Create a branch protection ruleset (REST):
    #   branch-ruleset:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_ruleset
    #             owner: my-org
    #             repo: my-repo
    #             ruleset_name: main branch protection
    #             target: branch
    #             enforcement: active
    #             include_refs:
    #               - refs/heads/main
    #             required_status_checks_contexts:
    #               - test
    #               - lint
    #             required_approving_review_count: 1
    #             required_linear_history: true
    #             requires_commit_signatures: true
    #             allow_force_pushes: false
    #             allow_deletions: false
    #
    # Create a tag protection ruleset (REST):
    #   tag-ruleset:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: create_ruleset
    #             owner: my-org
    #             repo: my-repo
    #             ruleset_name: version tag protection
    #             target: tag
    #             enforcement: active
    #             include_refs:
    #               - "refs/tags/v*"
    #             allow_deletions: false
    #             allow_force_pushes: false
    #
    # Enable vulnerability alerts (REST):
    #   vuln-alerts:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: enable_vulnerability_alerts
    #             owner: my-org
    #             repo: my-repo
    #
    # Enable automated security fixes (REST):
    #   auto-security-fixes:
    #     type: any
    #     resolve:
    #       with:
    #         - provider: github
    #           inputs:
    #             operation: enable_automated_security_fixes
