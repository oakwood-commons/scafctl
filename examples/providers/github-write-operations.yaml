# GitHub provider write operation examples — GraphQL mutations + REST releases.
# Requires GitHub authentication: scafctl auth login github
#
# ⚠️  These examples modify real repositories. Use with care.
#
# Commit operations use the createCommitOnBranch GraphQL mutation,
# which produces GPG-signed commits automatically.

# ─── Issue operations ─────────────────────────────────────────────────────────
# Create a new issue
# operation: create_issue
# owner: my-org
# repo: my-repo
# title: "Bug: something is broken"
# body: "Steps to reproduce..."
# labels:
#   - bug
#   - priority/high
# assignees:
#   - octocat

# ─── Pull request operations ─────────────────────────────────────────────────
# Create a pull request
# operation: create_pull_request
# owner: my-org
# repo: my-repo
# title: "feat: add new scaffolding templates"
# body: "This PR adds new templates for Go projects."
# head: feature-branch
# base: main
# draft: true

# Merge a pull request
# operation: merge_pull_request
# owner: my-org
# repo: my-repo
# number: 42
# merge_method: SQUASH
# commit_title: "feat: add new scaffolding templates (#42)"

# ─── Signed commit operations ────────────────────────────────────────────────
# First, get the HEAD OID for the branch
# operation: get_head_oid
# owner: my-org
# repo: my-repo
# branch: main

# Then create a signed commit with multiple files
# operation: create_commit
# owner: my-org
# repo: my-repo
# branch: feature-branch
# message: "feat: add scaffolded project files"
# message_body: "Auto-generated by scafctl scaffolding pipeline."
# expected_head_oid: abc123def456789012345678901234567890abcd
# additions:
#   - path: src/main.go
#     content: |
#       package main
#
#       func main() {}
#   - path: README.md
#     content: |
#       # My Project
#
#       Generated by scafctl.
# deletions:
#   - path: old-file.txt

# ─── Branch operations ───────────────────────────────────────────────────────
# Create a branch
# operation: create_branch
# owner: my-org
# repo: my-repo
# branch: feature-branch
# oid: abc123def456789012345678901234567890abcd

# Delete a branch
# operation: delete_branch
# owner: my-org
# repo: my-repo
# branch: feature-branch

# ─── Tag operations ──────────────────────────────────────────────────────────
# Create a lightweight tag
# operation: create_tag
# owner: my-org
# repo: my-repo
# tag: v1.0.0
# oid: abc123def456789012345678901234567890abcd

# ─── Release operations (REST API) ───────────────────────────────────────────
# Create a release
# operation: create_release
# owner: my-org
# repo: my-repo
# tag_name: v1.0.0
# name: "Release 1.0.0"
# body: "First stable release"
# prerelease: false
# target_commitish: main

# ─── Active example (uncomment one above to run) ─────────────────────────────
# Default: list branches (safe read operation)
operation: list_branches
owner: cli
repo: cli
