# Run: scafctl run solution -f examples/providers/hcl-validate.yaml
# Run: scafctl run resolver -f examples/providers/hcl-validate.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: hcl-validate-example
  displayName: HCL Validate Example
  category: providers
  tags:
    - hcl
    - provider-example
  description: Validate HCL/Terraform syntax and return diagnostics

spec:
  resolvers:
    validation-result:
      description: Validation result for Terraform content
      type: any
      resolve:
        with:
          - provider: hcl
            inputs:
              operation: validate
              content: |
                variable "region" {
                  type    = string
                  default = "us-east-1"
                }

                resource "aws_instance" "web" {
                  ami           = "ami-12345"
                  instance_type = "t3.micro"
                }
