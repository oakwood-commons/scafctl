# HCL Provider — Generate Terraform HCL
#
# Demonstrates generating HCL from structured block data.
# Produces standard .tf format output.
#
# Run: scafctl run solution -f examples/providers/hcl-generate.yaml
# Run: scafctl run resolver -f examples/providers/hcl-generate.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: hcl-generate-example
  version: 1.0.0
  description: Generate Terraform HCL from structured block data

spec:
  resolvers:
    generated-hcl:
      description: Generated Terraform HCL content
      type: any
      resolve:
        with:
          - provider: hcl
            inputs:
              operation: generate
              blocks:
                variables:
                  - name: region
                    type: string
                    default: us-east-1
                    description: "AWS region"
                  - name: env
                    type: string
                    default: dev
                    description: "Environment name"
                resources:
                  - type: aws_instance
                    name: web
                    attributes:
                      ami: ami-12345
                      instance_type: t3.micro
                outputs:
                  - name: instance_id
                    value: aws_instance.web.id
                    description: "The instance ID"
