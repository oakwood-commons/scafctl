# Prerequisites: scafctl auth login entra
#
# Run: scafctl run solution -f examples/providers/identity-scoped-status.yaml
# Run: scafctl run resolver -f examples/providers/identity-scoped-status.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: identity-scoped-status-example
  version: 1.0.0
  description: |
    Check scoped token status and metadata. Mints or retrieves a cached
    access token and returns expiry, flow, type, and JWT identity details.

spec:
  resolvers:
    scoped-status:
      description: Scoped token status with metadata and identity details
      type: any
      resolve:
        with:
          - provider: identity
            inputs:
              operation: status
              scope: https://management.azure.com/.default
              handler: entra
