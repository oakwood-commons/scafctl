# Run: scafctl run solution -f examples/providers/http-pagination-offset.yaml
# Run: scafctl run resolver -f examples/providers/http-pagination-offset.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: http-pagination-offset-example
  version: 1.0.0
  description: Offset-based pagination uses offset and limit query parameters

spec:
  resolvers:
    records:
      description: Records fetched via offset-based pagination
      type: any
      resolve:
        with:
          - provider: http
            inputs:
              url: "https://api.example.com/records"
              method: GET
              pagination:
                strategy: offset
                maxPages: 20
                limit: 50
                offsetParam: "offset"
                limitParam: "limit"
                collectPath: "body.records"
                stopWhen: "size(body.records) < 50"
