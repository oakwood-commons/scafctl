# ForEach Filter Example
# Demonstrates transform.forEach with keepSkipped to control nil handling.
#
# The `transform.forEach` clause iterates over an array and transforms each
# element. When a `when` condition is present, items that don't match the
# condition are skipped and produce a nil entry in the output array.
#
# By default (keepSkipped: false), nil entries are removed, producing a clean
# compact array with only the matched items.
#
# Setting `keepSkipped: true` retains nil entries so the output array remains
# index-aligned with the input array.
#
# Run: scafctl run resolver -f examples/resolvers/foreach-filter.yaml -o json --hide-execution

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: foreach-filter
  version: 1.0.0
  description: ForEach with keepSkipped to control nil handling in array resolvers

spec:
  resolvers:
    # ─────────────────────────────────────────────
    # 1. Source data — all users (active and inactive)
    # ─────────────────────────────────────────────
    allUsers:
      type: array
      description: All users, regardless of status
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - {name: Alice, role: admin,  active: true}
                - {name: Bob,   role: viewer, active: false}
                - {name: Carol, role: editor, active: true}
                - {name: Dave,  role: viewer, active: false}
                - {name: Eve,   role: admin,  active: true}

    # ─────────────────────────────────────────────
    # 2. keepSkipped: true — nil entries are preserved
    #    Output: [alice, null, carol, null, eve]
    # ─────────────────────────────────────────────
    activeUsersRaw:
      type: array
      description: Active users — nil placeholders retained for skipped items (index-aligned)
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
              keepSkipped: true   # Retain nil entries to stay index-aligned
            when:
              expr: 'user.active == true'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 3. keepSkipped: false (default) — nil entries are removed
    #    Output: [alice, carol, eve]
    # ─────────────────────────────────────────────
    activeUsers:
      type: array
      description: Active users only — nil entries removed (default keepSkipped=false)
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
              # keepSkipped: false is the default — nil entries are dropped
            when:
              expr: 'user.active == true'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 4. Admin users — filter by role
    #    Output: [alice, eve]
    # ─────────────────────────────────────────────
    adminUsers:
      type: array
      description: Users with the admin role
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
            when:
              expr: 'user.role == "admin"'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 5. Summary — derived from filtered resolvers
    # ─────────────────────────────────────────────
    summary:
      type: object
      description: Counts from the filtered resolvers
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: |
                  {
                    "total":   size(_.allUsers),
                    "active":  size(_.activeUsers),
                    "admins":  size(_.adminUsers),
                    "inactive": size(_.allUsers) - size(_.activeUsers)
                  }
