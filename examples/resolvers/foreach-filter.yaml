# ForEach Filter Example
# Demonstrates resolve.forEach with filter: true to remove nil results.
#
# The `resolve.forEach` clause iterates over an array and resolves a value for
# each element using a nested resolve block. Items where the nested resolve
# returns nil (e.g., because a `when` condition was false) are normally
# included as nil entries in the output array.
#
# Setting `filter: true` automatically removes those nil entries, producing
# a clean output array with only the matched items.
#
# Run: scafctl run resolver -f examples/resolvers/foreach-filter.yaml -o json --hide-execution

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: foreach-filter
  version: 1.0.0
  description: ForEach with filter to strip nil results from array resolvers

spec:
  resolvers:
    # ─────────────────────────────────────────────
    # 1. Source data — all users (active and inactive)
    # ─────────────────────────────────────────────
    allUsers:
      type: '[]object'
      description: All users, regardless of status
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - {name: Alice, role: admin,  active: true}
                - {name: Bob,   role: viewer, active: false}
                - {name: Carol, role: editor, active: true}
                - {name: Dave,  role: viewer, active: false}
                - {name: Eve,   role: admin,  active: true}

    # ─────────────────────────────────────────────
    # 2. Without filter — nil entries are preserved
    #    Output: [alice, nil, carol, nil, eve]
    # ─────────────────────────────────────────────
    activeUsersRaw:
      type: '[]object'
      description: Active users — nil placeholders for skipped items
      resolve:
        forEach:
          items:
            expr: allUsers
          as: user
          resolve:
            with:
              - provider: static
                when:
                  expr: 'user.active == true'
                inputs:
                  value:
                    expr: user

    # ─────────────────────────────────────────────
    # 3. With filter: true — nil entries are removed
    #    Output: [alice, carol, eve]
    # ─────────────────────────────────────────────
    activeUsers:
      type: '[]object'
      description: Active users only — nil entries stripped by filter
      resolve:
        forEach:
          items:
            expr: allUsers
          as: user
          filter: true          # Remove nil results from the output array
          resolve:
            with:
              - provider: static
                when:
                  expr: 'user.active == true'
                inputs:
                  value:
                    expr: user

    # ─────────────────────────────────────────────
    # 4. Admin users — filter combined with a different condition
    # ─────────────────────────────────────────────
    adminUsers:
      type: '[]object'
      description: Users with the admin role
      resolve:
        forEach:
          items:
            expr: allUsers
          as: user
          filter: true
          resolve:
            with:
              - provider: static
                when:
                  expr: 'user.role == "admin"'
                inputs:
                  value:
                    expr: user

    # ─────────────────────────────────────────────
    # 5. Summary — derived from filtered resolvers
    # ─────────────────────────────────────────────
    summary:
      type: object
      description: Counts from the filtered resolvers
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: |
                  {
                    "total":   size(allUsers),
                    "active":  size(activeUsers),
                    "admins":  size(adminUsers),
                    "inactive": size(allUsers) - size(activeUsers)
                  }
