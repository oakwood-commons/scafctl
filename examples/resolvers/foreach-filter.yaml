# Run: scafctl run resolver -f examples/resolvers/foreach-filter.yaml -o json

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: foreach-filter
  displayName: Foreach Filter
  category: resolvers
  tags:
    - foreach
    - resolver-example
  description: |
    ForEach with keepSkipped to control nil handling in array resolvers.
    When a when condition skips items, nil entries are produced. By default
    (keepSkipped: false) nils are removed for a compact array. Setting
    keepSkipped: true retains nils so output stays index-aligned with input.

spec:
    - resolver-example
  resolvers:
    # ─────────────────────────────────────────────
    # 1. Source data — all users (active and inactive)
    # ─────────────────────────────────────────────
    allUsers:
      type: array
      description: All users, regardless of status
      resolve:
        with:
          - provider: static
            inputs:
              value:
                - {name: Alice, role: admin,  active: true}
                - {name: Bob,   role: viewer, active: false}
                - {name: Carol, role: editor, active: true}
                - {name: Dave,  role: viewer, active: false}
                - {name: Eve,   role: admin,  active: true}

    # ─────────────────────────────────────────────
    # 2. keepSkipped: true — nil entries are preserved
    #    Output: [alice, null, carol, null, eve]
    # ─────────────────────────────────────────────
    activeUsersRaw:
      type: array
      description: Active users — nil placeholders retained for skipped items (index-aligned)
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
              keepSkipped: true   # Retain nil entries to stay index-aligned
            when:
              expr: 'user.active == true'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 3. keepSkipped: false (default) — nil entries are removed
    #    Output: [alice, carol, eve]
    # ─────────────────────────────────────────────
    activeUsers:
      type: array
      description: Active users only — nil entries removed (default keepSkipped=false)
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
              # keepSkipped: false is the default — nil entries are dropped
            when:
              expr: 'user.active == true'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 4. Admin users — filter by role
    #    Output: [alice, eve]
    # ─────────────────────────────────────────────
    adminUsers:
      type: array
      description: Users with the admin role
      dependsOn: [allUsers]
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: _.allUsers
      transform:
        with:
          - provider: cel
            forEach:
              item: user
            when:
              expr: 'user.role == "admin"'
            inputs:
              expression: 'user'

    # ─────────────────────────────────────────────
    # 5. Summary — derived from filtered resolvers
    # ─────────────────────────────────────────────
    summary:
      type: object
      description: Counts from the filtered resolvers
      resolve:
        with:
          - provider: static
            inputs:
              value:
                expr: |
                  {
                    "total":   size(_.allUsers),
                    "active":  size(_.activeUsers),
                    "admins":  size(_.adminUsers),
                    "inactive": size(_.allUsers) - size(_.activeUsers)
                  }
