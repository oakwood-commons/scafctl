# Hello World Example
# The simplest possible resolver that returns a static greeting.
#
# Run: scafctl run resolver -f hello-world.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: hello-world
  version: 1.0.0
  description: The simplest possible resolver example

spec:
  resolvers:
    greeting:
      description: A simple greeting message
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "Hello, World!"
