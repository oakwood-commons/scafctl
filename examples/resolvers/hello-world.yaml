# Run: scafctl run resolver -f hello-world.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: hello-world
  displayName: Hello World
  category: resolvers
  tags:
    - resolver-example
  description: The simplest possible resolver that returns a static greeting

spec:
  resolvers:
    greeting:
      description: A simple greeting message
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "Hello, World!"
