# Secret Provider Examples
#
# Prerequisites: Set up test secrets before running
#   echo "prod-api-key-12345" | scafctl secrets set api-token
#   echo "secret-db-password" | scafctl secrets set db-password
#   echo "localhost" | scafctl secrets set db-host
#   echo "optional-value" | scafctl secrets set optional-config
#
# Run: scafctl run solution -f secrets.yaml

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: secrets-example
  version: 1.0.0
  description: Secret provider examples

spec:
  resolvers:
    # Example 1: Get secret by exact name (required)
    api_token:
      description: API token from secrets store
      type: string
      sensitive: true
      resolve:
        with:
          - provider: secret
            inputs:
              operation: get
              name: api-token
              required: true

    # Example 2: Get secret with fallback (optional)
    optional_config:
      description: Optional configuration with fallback
      type: string
      resolve:
        with:
          - provider: secret
            onError: continue
            inputs:
              operation: get
              name: optional-setting
              required: false
          - provider: static
            inputs:
              value: "default-value"

    # Example 3: Pattern matching (finds first match)
    db_password:
      description: Database password from pattern match
      type: string
      sensitive: true
      resolve:
        with:
          - provider: secret
            inputs:
              operation: get
              pattern: ^db-.*$
              required: true

    # Example 4: List all secrets
    all_secrets:
      description: List of all available secrets
      type: array
      resolve:
        with:
          - provider: secret
            inputs:
              operation: list

    # Example 5: Use secret in transformation
    auth_header:
      description: Authorization header built from API token
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression: '"Bearer " + _.api_token'

    # Example 6: Build connection string from multiple secrets
    db_host:
      description: Database host
      type: string
      resolve:
        with:
          - provider: secret
            onError: continue
            inputs:
              operation: get
              name: db-host
              required: false
          - provider: static
            inputs:
              value: "localhost"

    db_connection_string:
      description: Complete database connection string
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression: '"postgresql://" + _.db_host + ":5432?password=" + _.db_password'

    # Example 7: Conditional secret access based on environment
    environment:
      description: Current environment
      type: string
      resolve:
        with:
          - provider: env
            onError: continue
            inputs:
              name: APP_ENV
          - provider: static
            inputs:
              value: "dev"

    # Example 8: Validate secret after retrieval
    validated_token:
      description: Validated API token
      type: string
      sensitive: true
      resolve:
        with:
          - provider: secret
            inputs:
              operation: get
              name: api-token
              required: true
      validate:
        with:
          - provider: validation
            inputs:
              expression: "size(__self) >= 10"
              message: "API token must be at least 10 characters"
