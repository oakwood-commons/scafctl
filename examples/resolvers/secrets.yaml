# Secrets Example
# Demonstrates secure handling of sensitive values with redaction.
#
# Run: DB_PASSWORD=secret123 API_KEY=key456 scafctl run solution -f secrets.yaml
#
# Note: Sensitive values are redacted in:
# - Log output
# - Error messages
# - Progress display

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: secrets-example
  version: 1.0.0
  description: Secure handling of sensitive values

spec:
  resolvers:
    # Database password from environment
    db_password:
      description: Database password from environment variable
      type: string
      sensitive: true  # Value will be redacted in logs
      resolve:
        with:
          # Try environment variable first
          - provider: env
            error_behavior: continue
            inputs:
              name: DB_PASSWORD
          # Fall back to parameter
          - provider: parameter
            error_behavior: continue
            inputs:
              name: db_password
          # Last resort: empty (will fail validation)
          - provider: static
            inputs:
              value: ""
      validate:
        with:
          - provider: validation
            inputs:
              expression:
                expr: "size(__self) > 0"
              message: "Database password is required"
    
    # API key from environment
    api_key:
      description: External API key
      type: string
      sensitive: true
      resolve:
        with:
          - provider: env
            error_behavior: continue
            inputs:
              name: API_KEY
          - provider: parameter
            inputs:
              name: api_key
              default: ""
    
    # Database configuration
    database_config:
      description: Database configuration with credentials
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression:
                expr: |
                  {
                    'host': 'db.example.com',
                    'port': 5432,
                    'database': 'myapp',
                    'user': 'app_user',
                    'password': _.db_password,
                    'ssl': true
                  }
    
    # Connection string (also sensitive since it contains password)
    connection_string:
      description: Full database connection string
      type: string
      sensitive: true
      resolve:
        with:
          - provider: cel
            inputs:
              expression:
                expr: |
                  'postgresql://app_user:' + _.db_password + '@db.example.com:5432/myapp?sslmode=require'
    
    # External API configuration
    api_config:
      description: External API configuration
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression:
                expr: |
                  {
                    'baseUrl': 'https://api.external.com/v1',
                    'hasApiKey': size(_.api_key) > 0,
                    'timeout': '30s',
                    'retries': 3
                  }
    
    # Summary (safe to log, no sensitive data)
    config_summary:
      description: Configuration summary (safe for logging)
      type: any
      resolve:
        with:
          - provider: cel
            inputs:
              expression:
                expr: |
                  {
                    'database': {
                      'host': _.database_config.host,
                      'port': _.database_config.port,
                      'database': _.database_config.database,
                      'ssl': _.database_config.ssl,
                      'hasPassword': size(_.db_password) > 0
                    },
                    'api': _.api_config
                  }
