# Run: scafctl run resolver -f parameters.yaml
# Run: scafctl run resolver -f parameters.yaml -r name=Alice -r count=5
# Run: scafctl run resolver -f parameters.yaml -r @params.yaml
# Run: echo '{"name": "Alice", "count": 5}' | scafctl run resolver -f parameters.yaml -r @-
# Run: echo Alice | scafctl run resolver -f parameters.yaml name=@-
# Run: scafctl run resolver -f parameters.yaml name=@name.txt

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: parameters-example
  version: 1.0.0
  description: |
    CLI parameter usage with default values and type coercion.
    Demonstrates positional args, -r flag, @file loading, @- stdin,
    and raw stdin piping into individual parameters.

spec:
  resolvers:
    # String parameter with default (using fallback chain)
    name:
      description: User name from CLI or default
      type: string
      resolve:
        with:
          - provider: parameter
            onError: continue
            inputs:
              key: name
          - provider: static
            inputs:
              value: "World"
    
    # Integer parameter with default
    count:
      description: Repetition count
      type: int
      resolve:
        with:
          - provider: parameter
            onError: continue
            inputs:
              key: count
          - provider: static
            inputs:
              value: 3
    
    # Boolean parameter
    uppercase:
      description: Whether to uppercase the output
      type: bool
      resolve:
        with:
          - provider: parameter
            onError: continue
            inputs:
              key: uppercase
          - provider: static
            inputs:
              value: false
    
    # Computed greeting using parameters
    greeting:
      description: Final greeting message
      type: string
      resolve:
        with:
          - provider: cel
            inputs:
              expression: |
                _.uppercase 
                  ? ('Hello, ' + _.name + '!').upperAscii()
                  : 'Hello, ' + _.name + '!'
    
    # Array output using count
    greetings:
      description: Multiple greetings based on count
      type: array
      resolve:
        with:
          - provider: cel
            inputs:
              # Create array of greetings
              expression: |
                lists.range(_.count).map(i, _.greeting + ' (#' + string(i + 1) + ')')
