# Example: Catalog with Native Registry Authentication
#
# This example shows how to configure automatic authentication for
# remote catalogs using scafctl's native auth handler bridge.
#
# Prerequisites:
#   scafctl auth login github    # Authenticate with GitHub
#
# With authProvider set, 'scafctl catalog pull' and 'scafctl catalog push'
# automatically use your GitHub auth session -- no 'catalog login' needed.

apiVersion: scafctl.dev/v1
kind: Config
metadata:
  name: native-auth-example

# Catalog configuration with automatic auth
catalogs:
  # GitHub Container Registry -- auto-bridges GitHub auth handler
  - name: company-solutions
    type: oci
    url: oci://ghcr.io/myorg/scafctl
    authProvider: github

  # Google Artifact Registry -- auto-bridges GCP auth handler
  # authScope is used by both dynamic auth and 'catalog login' (auto-detected)
  - name: gcp-solutions
    type: oci
    url: oci://us-docker.pkg.dev/my-project/scafctl
    authProvider: gcp
    authScope: https://www.googleapis.com/auth/cloud-platform

  # Azure Container Registry -- auto-bridges Entra auth handler
  # authScope is auto-detected by 'catalog login' when --scope is not provided
  - name: azure-solutions
    type: oci
    url: oci://myacr.azurecr.io/scafctl
    authProvider: entra
    authScope: https://management.azure.com/.default

  # Public registry -- no auth needed
  - name: community
    type: oci
    url: oci://ghcr.io/scafctl-community/catalog
