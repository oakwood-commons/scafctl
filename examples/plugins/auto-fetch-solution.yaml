# Prerequisites:
#   1. Build and publish the echo plugin to a catalog:
#      cd examples/plugins/echo && go build -o echo-provider .
#      scafctl catalog push provider echo-provider --version 1.0.0 --binary echo-provider
#   2. Or run without real plugins to see the resolution flow:
#      scafctl plugins install -f examples/plugins/auto-fetch-solution.yaml
#
# Run: scafctl plugins install -f examples/plugins/auto-fetch-solution.yaml
# Run: scafctl plugins list
# Run: scafctl run solution -f examples/plugins/auto-fetch-solution.yaml

apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: auto-fetch-demo
  displayName: Auto Fetch Demo
  category: developer-tools
  tags:
    - plugin
  description: |
    Automatic plugin fetching from catalogs at runtime. Declares plugin
    dependencies that are resolved and cached on first use.

spec:
  resolvers:
    greeting:
      description: Get a greeting from the echo plugin provider
      resolve:
        with:
          - provider: echo
            inputs:
              message: "Hello from auto-fetched plugin!"

  # Plugin dependencies — scafctl resolves these from the catalog chain
  # (local catalog first, then configured remote OCI registries)
  bundle:
    plugins:
      - name: echo-provider
        kind: provider
        version: "^1.0.0"
        defaults:
          prefix: "[auto-fetch-demo]"
