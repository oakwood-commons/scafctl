# Run: scafctl render solution -f examples/snapshots/basic-snapshot.yaml --snapshot --snapshot-file=/tmp/snapshot.json
# Run: scafctl snapshot show /tmp/snapshot.json
# Run: scafctl snapshot show /tmp/snapshot.json --format json
# Run: scafctl snapshot show /tmp/snapshot.json --format resolvers

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: snapshot-demo
  displayName: Snapshot Demo
  category: developer-tools
  tags:
    - snapshot
  description: |
    Capture and inspect execution snapshots. Snapshots record resolver
    state for debugging, testing, and comparison.

spec:
  resolvers:
    app_name:
      description: Application name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "my-app"

    version:
      description: Application version
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "2.1.0"

    deploy_target:
      description: Computed deploy target from app name and version
      type: string
      dependsOn:
        - app_name
        - version
      resolve:
        with:
          - provider: cel
            inputs:
              expression: "_.app_name + ':' + _.version"

    config:
      description: Application configuration object
      type: any
      dependsOn:
        - app_name
        - deploy_target
      resolve:
        with:
          - provider: static
            inputs:
              value:
                replicas: 3
                memory: "512Mi"
          - provider: cel
            inputs:
              expression: >
                __self.merge({
                  "image": _.deploy_target,
                  "name": _.app_name
                })
