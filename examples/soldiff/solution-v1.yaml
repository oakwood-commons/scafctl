# Run: scafctl solution diff -f examples/soldiff/solution-v1.yaml -f examples/soldiff/solution-v2.yaml
# Run: scafctl solution diff -f examples/soldiff/solution-v1.yaml -f examples/soldiff/solution-v2.yaml -o json

apiVersion: scafctl.io/v1
kind: Solution
metadata:
  name: soldiff-demo
  version: "1.0.0"
  displayName: Soldiff Demo
  category: developer-tools
  tags:
    - diff
  description: |
    Baseline solution for diff demonstration. Compare structurally against
    solution-v2.yaml to review changes before deploying.

spec:
  resolvers:
    app_name:
      description: Application name
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "my-service"

    replicas:
      description: Number of replicas
      type: int
      resolve:
        with:
          - provider: static
            inputs:
              value: 2

    environment:
      description: Target environment
      type: string
      resolve:
        with:
          - provider: static
            inputs:
              value: "staging"

  workflow:
    actions:
      deploy:
        description: Deploy the application
        with:
          - provider: exec
            inputs:
              command: echo
              args:
                - "Deploying {{ .app_name }} with {{ .replicas }} replicas to {{ .environment }}"
