version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /site
    schedule:
      interval: weekly
    groups:
      docs-dependencies:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /scripts
    schedule:
      interval: weekly
    groups:
      scripts-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      ci-dependencies:
        patterns:
          - "*"
