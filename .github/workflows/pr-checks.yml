name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  lint-and-test:
    name: Lint and Test
    # Disabled until the repo is made public
    if: false
    # Only run automatically for PRs from the same repo (not forks)
    # if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper versioning
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download dependencies
        run: task mod
      
      - name: Run linter
        run: task lint
      
      - name: Run tests
        run: task test
        env:
          # Test-only key ("test-secret-key-for-ci-123456789") — not a real secret.
          # Must be exactly 32 bytes when base64-decoded (AES-256 master key).
          # Kept inline so CI works for fork PRs (secrets are unavailable to forks).
          SCAFCTL_SECRET_KEY: dGVzdC1zZWNyZXQta2V5LWZvci1jaS0xMjM0NTY3ODk=

      - name: Run functional integration tests
        run: task integration
        env:
          # Test-only key — see comment above.
          SCAFCTL_SECRET_KEY: dGVzdC1zZWNyZXQta2V5LWZvci1jaS0xMjM0NTY3ODk=

      - name: Lint solution examples and integration tests
        run: task lint:solutions
        env:
          # Test-only key — see comment above.
          SCAFCTL_SECRET_KEY: dGVzdC1zZWNyZXQta2V5LWZvci1jaS0xMjM0NTY3ODk=
