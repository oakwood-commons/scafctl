name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    # Only run on PRs from the same repo (not forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: task mod

      - name: Run linter
        run: task lint

      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  test:
    name: Test
    # Run on PRs from the same repo and on push to main
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: Re-enable macos-latest and windows-latest when cross-platform issues are resolved
        os: [ubuntu-latest]
    env:
      SCAFCTL_SECRET_KEY: ${{ secrets.SCAFCTL_SECRET_KEY || 'MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: task mod

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: task test-cover

      - name: Run functional integration tests
        run: task integration

      - name: Lint solution examples and integration tests
        run: task lint:solutions

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          fail_ci_if_error: false

  plugin-sdk-compat:
    name: Plugin SDK Compatibility
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Build echo plugin with SDK-only deps
        run: |
          set -euo pipefail
          sdk_version=$(go list -m -f '{{.Version}}' github.com/oakwood-commons/scafctl-plugin-sdk)
          workdir=$(mktemp -d)
          cp examples/plugins/echo/main.go "$workdir/"
          cd "$workdir"
          go mod init echo-plugin-sdk-compat
          go get "github.com/oakwood-commons/scafctl-plugin-sdk@${sdk_version}"
          go mod tidy
          go build -o echo-plugin .

          # Verify no scafctl dependency in the module graph
          if go mod graph | grep -q 'github.com/oakwood-commons/scafctl@'; then
            echo "ERROR: echo plugin still transitively depends on scafctl"
            go mod graph | grep 'github.com/oakwood-commons/scafctl@'
            exit 1
          fi

          echo "Echo plugin built successfully with SDK-only dependencies"
          ls -lh echo-plugin
