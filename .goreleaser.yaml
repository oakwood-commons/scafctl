version: 2
builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/scafctl
    binary: "{{ .ProjectName }}"
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
          - -w
          - -s
          - -X main.Commit={{.Commit}}
          - -X main.BuildVersion={{.Version}}
          - -X main.BuildTime={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    format_overrides:
      - goos: windows
        formats: ['zip']
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}" # set this environment variable for your signing key
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
blobs:

  - provider: gs
    bucket: scafctl-assets
    directory: "cli/{{.Version}}"

release:
  draft: false
  prerelease: auto
changelog:
  disable: false
