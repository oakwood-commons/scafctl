apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: git-repo-normalizer
  version: 1.0.0
  displayName: Git Repository Normalizer
  description: |
    Parse and normalize Git repository URLs into consistent naming conventions.
    Demonstrates resolver pipeline: resolve → transform → validate → emit.
    Shows how transforms can derive values, normalize formats, and prepare data for validation.
  category: automation
  tags:
    - git
    - validation
    - transformation
  maintainers:
    - name: scafctl team
      email: team@example.com

spec:

  # Resolvers produce normalized git repository data
  resolvers:

    repoUrl:
      description: Git repository URL (https or ssh format)
      resolve:
        from:
          - provider: cli
            key: repoUrl
          - provider: env
            key: GIT_REPO_URL
          - provider: static
            value: "https://github.com/scafctl/scafctl.git"
      validate:
        - regex: "^(https://|git@|ssh://)"
          message: "Repository URL must be https://, git@, or ssh://"

    # This resolver demonstrates the full pipeline
    repoName:
      description: Extracted and normalized repository name
      resolve:
        from:
          # Extract from URL using expression provider
          - provider: expression
            expr: |
              _.repoUrl.contains('/')
                ? _.repoUrl.split('/')[_.repoUrl.split('/').size() - 1]
                : _.repoUrl

      # Transform phase: normalize the extracted name
      transform:
        into:
          - expr: __self.replace('.git', '').replace('_', '-').toLowerCase()

      # Validate phase: ensure name follows conventions
      validate:
        - expr: __self.matches("^[a-z0-9-]+$")
          message: "Repository name must contain only lowercase letters, numbers, and hyphens"
        - expr: size(__self) >= 2 && size(__self) <= 50
          message: "Repository name must be between 2 and 50 characters"
        - expr: !__self.startsWith('-') && !__self.endsWith('-')
          message: "Repository name cannot start or end with a hyphen"

    # More complex transform example: derive multiple values
    repoOrg:
      description: Organization or user extracted from URL
      resolve:
        from:
          - provider: cli
            key: org
          - provider: expression
            expr: |
              _.repoUrl.contains('github.com/')
                ? _.repoUrl.split('github.com/')[1].split('/')[0]
                : _.repoUrl.contains('gitlab.com/')
                ? _.repoUrl.split('gitlab.com/')[1].split('/')[0]
                : 'unknown'

      # Transform: normalize organization name
      transform:
        into:
          - expr: __self.toLowerCase()

      validate:
        - expr: __self != 'unknown' || _.repoUrl.contains('localhost')
          message: "Could not extract organization from URL. Supported: GitHub, GitLab"

    # Transform with conditional logic
    branchName:
      description: Safe branch name derived from repo name
      resolve:
        from:
          - provider: cli
            key: branch
          - provider: expression
            expr: "_.repoName"

      # Transform: prefix with conventional branch type
      transform:
        into:
          - expr: "'feature/' + __self"

      validate:
        - expr: __self.matches("^(feature|fix|docs|chore)/[a-z0-9-]+$")
          message: "Branch name must follow convention: feature/*, fix/*, docs/*, or chore/*"

    # Transform that processes multiple resolvers
    cloneCommand:
      description: Ready-to-use git clone command
      resolve:
        from:
          - provider: expression
            expr: "'git clone ' + _.repoUrl + ' ' + _.repoName"

      # Transform: add optional branch checkout
      transform:
        into:
          - expr: |
              _.cloneBranch ?
                __self + ' && cd ' + _.repoName + ' && git checkout ' + _.cloneBranch
                : __self

      validate:
        - expr: __self.startsWith('git clone')
          message: "Clone command must start with 'git clone'"

    cloneBranch:
      description: Branch to checkout after clone (optional)
      resolve:
        from:
          - provider: cli
            key: branch
          - provider: static
            value: ""

    # Transform with conditional stopping: demonstrates 'until:' and 'when:' at transform level
    normalizedBranch:
      description: Normalized branch name with fallback logic and conditional transform stopping
      resolve:
        from:
          - provider: user-input
            key: normalizedBranch
          - provider: static
            value: ""

      # Transform array with conditional stopping using 'until:' at transform level
      # 'when:' at transform level applies to ALL items in 'into:'
      transform:
        when: _.repoUrl != ""  # Only run transform if repo URL is provided
        until: __self != ""    # Stop remaining items once we have a non-empty value
        into:
          # Step 1: Try to use cloneBranch if provided
          - expr: _.cloneBranch != "" ? _.cloneBranch : __self

          # Step 2: If still empty, use branchName as fallback
          - expr: _.branchName != "" ? _.branchName : __self

          # Step 3: Always normalize to safe branch name format
          - expr: __self.toLowerCase().replace(' ', '-').replace('_', '-')

      validate:
        - expr: __self == "" || __self.matches("^[a-z0-9-/]+$")
          message: "Branch name must contain only lowercase letters, numbers, hyphens, and slashes"

    # Transform with type-based stopping: demonstrates 'until: type(__self) == ...'
    repoConfig:
      description: Repository configuration that can be string URL or object config
      resolve:
        from:
          - provider: cli
            key: repoConfig
          - provider: expression
            expr: "_.repoUrl"  # Default to URL string

      # Transform with type checking using 'until:' at transform level
      transform:
        into:
          # Step 1: Try to parse as JSON if it's a string
          - expr: |
              type(__self) == "string" ?
                (__self.startsWith('{') ? parseJson(__self) : __self)
                : __self

          # Step 2: If we have object, ensure it has required fields
          - expr: |
              type(__self) == "object" ?
                __self + {url: __self.url || _.repoUrl, name: __self.name || _.repoName}
                : __self

          # Step 3: Convert back to normalized string if needed
          - expr: |
              type(__self) == "object" ? __self.url : __self

      validate:
        - expr: __self != null && __self != ""
          message: "Repository config must be valid URL or JSON object"

    # Transform with 'when:' at individual item level
    deploymentConfig:
      description: Configuration for deployment environments
      resolve:
        from:
          - provider: cli
            key: deploymentConfig
          - provider: static
            value: "dev"

      # Transform with conditional item execution using 'when:' at item level
      transform:
        into:
          # Step 1: Only run if environment is production
          - expr: __self.toUpperCase()
            when: __self == "prod"

          # Step 2: Only run if environment is NOT production
          - expr: __self + "-staging"
            when: __self != "prod"

          # Step 3: Always normalize to valid deployment name
          - expr: __self.matches("^[a-z0-9-]+$") ? __self : "default"

    description:
      description: Auto-generated repository description
      resolve:
        from:
          - provider: cli
            key: description
          - provider: static
            value: ""

      # Transform: generate from repo info if not provided
      transform:
        into:
          - expr: |
              __self == "" ?
                "Repository: " + _.repoName + " from " + _.repoOrg
                : __self

      validate:
        - expr: size(__self) <= 200
          message: "Description must be 200 characters or less"

  # Actions demonstrate using transformed values
  actions:

    display-normalized-repo:
      description: Display normalized repository information
      provider: shell
      inputs:
        cmd:
          - "echo 'Repository Information:'"
          - "echo 'URL: {{ _.repoUrl }}'"
          - "echo 'Name: {{ _.repoName }}'"
          - "echo 'Organization: {{ _.repoOrg }}'"
          - "echo 'Branch: {{ _.branchName }}'"
          - "echo 'Normalized Branch: {{ _.normalizedBranch }}'"
          - "echo 'Config: {{ _.repoConfig }}'"
          - "echo 'Deployment Config: {{ _.deploymentConfig }}'"
          - "echo 'Description: {{ _.description }}'"
          - "echo ''"
          - "echo 'Clone Command:'"
          - "echo {{ _.cloneCommand }}"

catalog:
  visibility: public
  beta: false
  disabled: false

testing:
  tests:

    - name: resolve-github-https
      type: engine
      synopsis: Normalize GitHub HTTPS URL with defaults
      want:
        resolvers:
          repoUrl: "https://github.com/scafctl/scafctl.git"
          repoName: "scafctl"
          repoOrg: "scafctl"
          branchName: "feature/scafctl"
          cloneCommand: "git clone https://github.com/scafctl/scafctl.git scafctl"
          description: "Repository: scafctl from github.com/scafctl"

    - name: resolve-custom-github-url
      type: engine
      synopsis: Transform custom GitHub URL without .git suffix
      parameters:
        - -r
        - repoUrl=https://github.com/my-org/my_awesome_project
      want:
        resolvers:
          repoUrl: "https://github.com/my-org/my_awesome_project"
          repoName: "my-awesome-project"
          repoOrg: "my-org"
          branchName: "feature/my-awesome-project"

    - name: resolve-with-branch-checkout
      type: engine
      synopsis: Transform clone command with branch checkout
      parameters:
        - -r
        - repoUrl=https://github.com/test-org/test-repo.git
        - -r
        - branch=main
      want:
        resolvers:
          repoName: "test-repo"
          branchName: "main"
          cloneCommand: "git clone https://github.com/test-org/test-repo.git test-repo && cd test-repo && git checkout main"
          cloneBranch: "main"

    - name: validate-repo-name-format
      type: engine
      synopsis: Validate that transformed repo name follows conventions
      parameters:
        - -r
        - repoUrl=https://github.com/my-org/Valid_Repo_Name_123.git
      want:
        resolvers:
          repoName: "valid-repo-name-123"

    - name: custom-description
      type: engine
      synopsis: Validate custom description is preserved in transform
      parameters:
        - -r
        - repoUrl=https://github.com/test/repo
        - -r
        - description="My custom repository description"
      want:
        resolvers:
          description: "My custom repository description"

    - name: until-condition-with-clone-branch
      type: engine
      synopsis: Validate conditional transform stopping with 'until:' - uses cloneBranch
      parameters:
        - -r
        - repoUrl=https://github.com/test/repo
        - -r
        - branch=production
      want:
        resolvers:
          cloneBranch: "production"
          normalizedBranch: "production"

    - name: until-condition-without-clone-branch
      type: engine
      synopsis: Validate conditional transform stopping with 'until:' - falls back to branchName
      parameters:
        - -r
        - repoUrl=https://github.com/test/repo
      want:
        resolvers:
          cloneBranch: ""
          normalizedBranch: "feature/repo"

    - name: until-condition-with-normalization
      type: engine
      synopsis: Validate transform normalization applies when no early stop
      parameters:
        - -r
        - repoUrl=https://github.com/test/MY_BRANCH
        - -r
        - normalizedBranch="my branch"
      want:
        resolvers:
          normalizedBranch: "my-branch"

    - name: until-type-check-string-input
      type: engine
      synopsis: Validate type-based 'until:' with string input (URL)
      parameters:
        - -r
        - repoUrl=https://github.com/test/repo
        - -r
        - repoConfig=https://github.com/test/repo
      want:
        resolvers:
          repoConfig: "https://github.com/test/repo"

    - name: until-type-check-json-input
      type: engine
      synopsis: Validate type-based 'until:' stops when parsing JSON to object
      parameters:
        - -r
        - repoUrl=https://github.com/test/repo
        - -r
        - 'repoConfig={"url":"https://github.com/custom/repo","name":"custom"}'
      want:
        resolvers:
          repoConfig: "https://github.com/custom/repo"

    - name: transform-when-production-env
      type: engine
      synopsis: Validate 'when:' at item level skips for non-production
      parameters:
        - -r
        - deploymentConfig=dev
      want:
        resolvers:
          deploymentConfig: "dev-staging"

    - name: transform-when-prod-env
      type: engine
      synopsis: Validate 'when:' at item level executes only for production
      parameters:
        - -r
        - deploymentConfig=prod
      want:
        resolvers:
          deploymentConfig: "PROD"

    - name: dry-run-normalize
      type: cli
      synopsis: Verify repository normalization without side effects
      command: [run, solution:git-repo-normalizer]
      parameters:
        - -r
        - repoUrl=https://github.com/scafctl/scafctl.git
        - --dry-run
      want:
        status: pass
