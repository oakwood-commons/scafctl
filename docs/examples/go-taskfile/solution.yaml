apiVersion: scafctl.io/v1
kind: Solution

metadata:
  name: go-project-pipeline
  version: 1.0.0
  displayName: Go Project Pipeline
  description: |
    Orchestrate Go project workflows using scafctl.
    Demonstrates lint, test, build, and container image creation with action dependencies.
  category: automation
  tags:
    - golang
    - build
    - ci
  maintainers:
    - name: scafctl team
      email: team@example.com

spec:

  # Providers define reusable execution primitives
  providers:
    - name: shell
      type: sh
      description: Execute shell commands

  # Resolvers produce data deterministically
  resolvers:

    projectName:
      description: Name of the Go project
      resolve:
        from:
          - provider: cli
            key: projectName
          - provider: env
            key: PROJECT_NAME
          - provider: static
            value: my-go-app
      validate:
        regex: "^[a-zA-Z0-9-_]+$"
        errorMessage: Project name must be alphanumeric, dash, or underscore

    version:
      description: Application version
      resolve:
        from:
          - provider: cli
            key: version
          - provider: env
            key: APP_VERSION
          - provider: git
            field: tag
          - provider: static
            value: "0.0.0-dev"

    imageName:
      description: Container image name derived from project and version
      resolve:
        from:
          - provider: expression
            expr: _.projectName + ":" + _.version

    goEnv:
      description: Go environment variables
      resolve:
        from:
          - provider: static
            value:
              GOOS: linux
              GOARCH: amd64

    registry:
      description: Container registry
      resolve:
        from:
          - provider: cli
            key: registry
          - provider: env
            key: REGISTRY
          - provider: static
            value: docker.io

  # Templates (optional for this example, but can be added for generated files)
  templates: []

  # Actions execute side effects - keys allow explicit dependency management via DAG or dependsOn
  actions:

    lint:
      description: Run Go linters
      provider: shell
      inputs:
        cmd:
          - echo "Running lint for {{ _.projectName }}"
          - golangci-lint run ./...
        env:
          - GOOS={{ _.goEnv.GOOS }}
          - GOARCH={{ _.goEnv.GOARCH }}

    test:
      description: Run Go tests
      provider: shell
      dependsOn:
        - lint
      inputs:
        cmd:
          - echo "Running tests for {{ _.projectName }}"
          - go test -v ./...
        env:
          - GOOS={{ _.goEnv.GOOS }}
          - GOARCH={{ _.goEnv.GOARCH }}

    build:
      description: Build Go binary
      provider: shell
      dependsOn:
        - test
      inputs:
        cmd:
          - echo "Building {{ _.projectName }} version {{ _.version }}"
          - go build -o bin/{{ _.projectName }} ./cmd/{{ _.projectName }}
        env:
          - GOOS={{ _.goEnv.GOOS }}
          - GOARCH={{ _.goEnv.GOARCH }}

    container-image:
      description: Build and tag container image
      provider: shell
      dependsOn:
        - build
      when: _.version != "0.0.0-dev"
      inputs:
        cmd:
          - echo "Building container image {{ _.registry }}/{{ _.imageName }}"
          - docker build -t {{ _.registry }}/{{ _.imageName }} .
        env:
          - IMAGE_NAME={{ _.registry }}/{{ _.imageName }}

catalog:
  visibility: public
  beta: false
  disabled: false

testing:
  tests:
    - name: resolve-defaults
      type: engine
      synopsis: Validate resolver defaults without user input
      want:
        resolvers:
          projectName: my-go-app
          version: "0.0.0-dev"
          imageName: "my-go-app:0.0.0-dev"

    - name: resolve-cli-input
      type: engine
      synopsis: Validate resolvers with CLI input
      parameters:
        - -r
        - projectName=awesome-app
        - -r
        - version=1.2.3
      want:
        resolvers:
          projectName: awesome-app
          version: "1.2.3"
          imageName: "awesome-app:1.2.3"

    - name: dry-run-default
      type: cli
      synopsis: Verify action plan with default values
      command: [run, solution:go-project-pipeline]
      parameters: [--dry-run]
      want:
        status: pass
