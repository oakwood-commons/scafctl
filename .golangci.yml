version: "2"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - gochecknoinits
    - goheader
    - gomodguard
    - goprintffuncname
    - importas
    - makezero
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - predeclared
    - promlinter
    - tparallel
    - unparam
    - whitespace
    - staticcheck
    - revive
    - forbidigo
    - forcetypeassert
    - gocritic
    - gosec
    - noctx
  # disable:
  # # disabling temporarily and will be enabled back after fixing issues
  #   - staticcheck
  settings:
    gocritic:
      disabled-checks:
        - unlambda
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          # - gocyclo
          - errcheck
          - dupl
          - gosec
          - forcetypeassert
          - revive
          - gocritic
      # Exclude dupl from CEL extension files with similar function registration patterns
      - path: pkg/celexp/ext/marshalling/marshalling\.go
        linters:
          - dupl
      - path: pkg/celexp/ext/sort/sort\.go
        linters:
          - dupl
      # Exclude var-naming for packages that intentionally shadow standard library names
      - path: pkg/filepath/filepath\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/fs/fs\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/metrics/metrics\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/celexp/ext/debug/debug\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/cmd/scafctl/build/solution\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/plugin/server\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/plugin/.*\.go
        linters:
          - revive
      - path: pkg/terminal/format/format\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/celexp/ext/filepath/filepath\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/celexp/ext/strings/strings\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/cmd/scafctl/build/build\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
      - path: pkg/cmd/scafctl/build/plugin\.go
        linters:
          - revive
        text: "var-naming: avoid package names"
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$